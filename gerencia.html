<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catosa GP - Control Maestro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --red: #d21034; --bg: #0c0e10; --card: #1a1d20; --green: #00ff88; --blue: #00d4ff; --text: #f5f5f5; --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; border-top: 5px solid var(--red); text-align: center; width: 300px; }
        #main-app { display: none; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--card); border-radius: 10px; border-bottom: 2px solid #333; margin-bottom: 15px; }
        .role-badge { font-size: 1rem; font-weight: 900; color: var(--gold); letter-spacing: 2px; border: 2px solid var(--gold); padding: 5px 15px; border-radius: 5px; }
        
        .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .kpi-card { background: var(--card); padding: 12px; border-radius: 10px; border-top: 3px solid var(--blue); text-align: center; }
        .kpi-val { font-size: 1.1rem; font-weight: bold; color: var(--green); }
        .kpi-card span { font-size: 0.5rem; color: #888; text-transform: uppercase; display: block; }

        .medal-bar { display: flex; justify-content: space-around; background: #000; padding: 10px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #222; }
        .medal-item { text-align: center; font-size: 0.6rem; font-weight: bold; }
        .medal-item div { font-size: 1.2rem; margin-top: 2px; }

        .race-track { background: #050505; border-radius: 15px; padding: 15px 0; border: 1px solid #333; position: relative; overflow: hidden; margin-bottom: 20px; }
        .lane { height: 45px; position: relative; border-bottom: 1px dashed #222; display: flex; align-items: center; }
        .v-name { width: 110px; font-size: 0.5rem; color: #888; padding-left: 10px; white-space: nowrap; overflow: hidden; }
        .truck { position: absolute; width: 50px; height: 28px; background-image: url('camion-intl.png'); background-size: contain; background-repeat: no-repeat; transition: 2s; z-index: 10; }
        .truck.bronce { filter: drop-shadow(0 0 8px var(--bronze)); }
        .truck.plata { filter: drop-shadow(0 0 12px var(--silver)); }
        .truck.oro { filter: drop-shadow(0 0 18px var(--gold)); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #333; }

        .prod-row { display: flex; align-items: center; background: rgba(255,255,255,0.02); margin-bottom: 8px; padding: 10px; border-radius: 8px; }
        .prod-rank { color: var(--gold); font-size: 1.1rem; font-weight: 900; margin-right: 15px; width: 20px; border-left: 3px solid var(--gold); padding-left: 8px; }
        .prod-info { flex: 1; }
        .prod-info b { font-size: 0.85rem; display: block; color: #fff; }
        .prod-info small { font-size: 0.65rem; color: #666; }
        .prod-stat { text-align: right; }
        .prod-stat b { color: var(--green); font-size: 0.85rem; display: block; }
        .prod-stat small { font-size: 0.7rem; }

        .seg-item { border-left: 4px solid var(--blue); background: #000; padding: 12px; margin-bottom: 10px; border-radius: 0 8px 8px 0; font-size: 0.75rem; line-height: 1.4; }
        input, select { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        .btn { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: #fff; background: var(--red); text-transform: uppercase; font-size: 0.75rem; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box"><img src="logo-catosa.png" style="max-height: 40px; margin-bottom: 20px;"><input type="text" id="u-role" placeholder="USUARIO"><input type="password" id="u-pass" placeholder="PASSWORD"><button class="btn" style="width:100%" onclick="login()">ENTRAR</button></div>
    </div>

    <div id="main-app">
        <div class="header">
            <img src="logo-catosa.png" style="max-height: 25px;">
            <div id="role-display" class="role-badge">--</div>
            <button class="btn" style="background:none; border:1px solid var(--red); color:var(--red); padding: 5px 15px;" onclick="location.reload()">SALIR</button>
        </div>

        <div class="kpi-row">
            <div class="kpi-card"><span>Venta Global</span><div class="kpi-val" id="g-v">$0</div></div>
            <div class="kpi-card"><span>Falta Plata</span><div class="kpi-val" id="g-falta" style="color:var(--text)">$0</div></div>
            <div class="kpi-card"><span>Alcance Plata</span><div class="kpi-val" id="g-p-plata" style="color:var(--blue)">0%</div></div>
            <div class="kpi-card"><span>Alcance Oro</span><div class="kpi-val" id="g-p-oro" style="color:var(--gold)">0%</div></div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">
            <select id="f-suc" onchange="renderTrack()"><option value="TODAS">SUCURSAL: TODAS</option></select>
            <select id="f-vend" onchange="renderTrack()"><option value="TODOS">VENDEDOR: TODOS</option></select>
        </div>

        <div class="medal-bar">
            <div class="medal-item" style="color:var(--bronze)">BRONCE (85%)<div id="c-bronce">0</div></div>
            <div class="medal-item" style="color:var(--silver)">PLATA (100%)<div id="c-plata">0</div></div>
            <div class="medal-item" style="color:var(--gold)">ORO (115%)<div id="c-oro">0</div></div>
        </div>

        <div class="race-track" id="pista"></div>

        <div class="grid">
            <div class="card">
                <h2>📦 Almacén Inteligente</h2>
                <input type="text" placeholder="Buscar SKU o Marca..." oninput="checkInventory(this.value)">
                <div id="inv-res" style="max-height: 300px; overflow-y: auto;"></div>
            </div>

            <div class="card">
                <h2>🔥 Top 10 Productos</h2>
                <div id="top-prod-list" style="max-height: 350px; overflow-y: auto;"></div>
            </div>

            <div class="card">
                <h2>📅 Bitácora de Gestiones</h2>
                <div id="seg-list" style="max-height: 350px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <script>
        const L = {
            v: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=0&single=true&output=csv",
            s: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=480185164&single=true&output=csv",
            p: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1610979668&single=true&output=csv",
            det: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1262272182&single=true&output=csv"
        };
        let dbV=[], dbS=[], dbP=[], dbD=[];

        function login() {
            const u = document.getElementById('u-role').value.toUpperCase(), p = document.getElementById('u-pass').value;
            if((u==='GERENTE'||u==='DIRECTOR') && (p==='CATOSA2026'||p==='MASTER2026')) {
                document.getElementById('login-screen').style.display='none'; 
                document.getElementById('main-app').style.display='block';
                document.getElementById('role-display').innerText = u;
                loadData();
            } else { alert("Acceso denegado"); }
        }

        function loadData() {
            Papa.parse(L.p, { download:true, header:true, complete: r => { 
                dbP = r.data; 
                checkInventory(""); 
                Papa.parse(L.v, { download:true, header:true, complete: r => { 
                    dbV=r.data; 
                    const s = document.getElementById('f-suc'), v = document.getElementById('f-vend');
                    [...new Set(dbV.map(x=>x.Sucursal))].filter(x=>x).forEach(x=>s.innerHTML+=`<option value="${x}">${x}</option>`);
                    dbV.filter(x=>x.Nombre).forEach(x=>v.innerHTML+=`<option value="${x.Nombre}">${x.Nombre}</option>`);
                    renderTrack(); 
                }});
                Papa.parse(L.s, { download:true, header:true, complete: r => { dbS=r.data; renderGestiones(); } });
                Papa.parse(L.det, { download:true, header:true, complete: r => { dbD=r.data; calcTopProducts(); } });
            }});
        }

        function renderTrack() {
            const pista = document.getElementById('pista'); pista.innerHTML = '';
            const fs = document.getElementById('f-suc').value, fv = document.getElementById('f-vend').value;
            let tv=0, tm=0, cB=0, cP=0, cO=0;

            dbV.filter(v => v.Nombre && (fs==='TODAS'||v.Sucursal===fs) && (fv==='TODOS'||v.Nombre===fv)).forEach(v => {
                const ven = parseFloat(v.Ventas.replace(/[^0-9.]/g,''))||0, met = parseFloat(v.Meta.replace(/[^0-9.]/g,''))||1;
                tv += ven; tm += met;
                const pct = (ven/met)*100, pos = Math.min(100, (pct/115)*100);
                let rc = pct>=115 ? 'oro' : (pct>=100 ? 'plata' : (pct>=85 ? 'bronce' : ''));
                if(rc==='oro') cO++; else if(rc==='plata') cP++; else if(rc==='bronce') cB++;
                pista.innerHTML += `<div class="lane"><small class="v-name">${v.Nombre}</small><div class="truck ${rc}" style="left:calc(${pos}% - 50px)"></div></div>`;
            });

            document.getElementById('c-bronce').innerText = cB;
            document.getElementById('c-plata').innerText = cP;
            document.getElementById('c-oro').innerText = cO;
            document.getElementById('g-v').innerText="$"+Math.floor(tv).toLocaleString();
            document.getElementById('g-falta').innerText="$"+Math.max(0, Math.floor(tm - tv)).toLocaleString();
            document.getElementById('g-p-plata').innerText=((tv/tm)*100 || 0).toFixed(1)+"%";
            document.getElementById('g-p-oro').innerText=((tv/(tm*1.15))*100 || 0).toFixed(1)+"%";
        }

        function calcTopProducts() {
            const list = document.getElementById('top-prod-list'); 
            let counts = {};
            dbD.forEach(v => { 
                const p = (v.Parte||v.SKU||"").toString().trim().toUpperCase(); 
                if(p && p !== "PARTE") counts[p] = (counts[p]||0) + parseInt(v.Cantidad||1); 
            });
            const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,10);
            list.innerHTML = '';
            sorted.forEach(([sku, qty], i) => {
                const sInfo = dbP.find(p => (p.Parte||"").toString().trim().toUpperCase() === sku);
                const stockVal = sInfo ? parseInt(sInfo.Existencia) : 0;
                const marca = sInfo ? sInfo.Marca : "FLEETRITE";
                list.innerHTML += `
                <div class="prod-row">
                    <div class="prod-rank">${i+1}</div>
                    <div class="prod-info"><b>${sku}</b><small>${marca}</small></div>
                    <div class="prod-stat"><b>${qty} vend.</b><small style="color:${stockVal<=5?'var(--red)':'var(--green)'}">${stockVal} stock</small></div>
                </div>`;
            });
        }

        function checkInventory(q) {
            const box = document.getElementById('inv-res');
            let list = q ? dbP.filter(p => (p.Parte||'').toUpperCase().includes(q.toUpperCase()) || (p.Marca||'').toUpperCase().includes(q.toUpperCase())) : dbP.filter(p => parseInt(p.Existencia) <= 3);
            box.innerHTML = q ? '' : '<div style="font-size:0.6rem; color:var(--gold); text-align:center; margin-bottom:5px;">STOCK BAJO/CRÍTICO</div>';
            list.slice(0,20).forEach(p => {
                const qty = parseInt(p.Existencia)||0;
                box.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #222; font-size:0.75rem;"><div><b>${p.Parte}</b><br><small>${p.Marca}</small></div><b style="color:${qty<=0?'var(--red)':'var(--green)'}">${qty} pz</b></div>`;
            });
        }

        function renderGestiones() {
            const bl = document.getElementById('seg-list'); bl.innerHTML = '';
            dbS.slice().reverse().slice(0,20).forEach(s => {
                bl.innerHTML += `<div class="seg-item"><b>VENDEDOR:</b> ${s.Vendedor}<br><b>CLIENTE:</b> ${s.Cliente}<br><small><b>MOTIVO:</b> ${s.Motivo} | <b>RESULTADO:</b> ${s.Resultado}</small></div>`;
            });
        }
    </script>
</body>
</html>
