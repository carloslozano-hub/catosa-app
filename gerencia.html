<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catosa GP - Executive Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --red: #d21034; --bg: #0c0e10; --card: #1a1d20; --green: #00ff88; --blue: #00d4ff; --text: #f5f5f5; --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* LOGIN EMPRESARIAL */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 25px; border-radius: 12px; border-top: 4px solid var(--red); text-align: center; width: 280px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .login-box input { width: 100%; background: #000; border: 1px solid #333; padding: 10px; border-radius: 6px; color: #fff; margin-bottom: 12px; font-size: 0.85rem; box-sizing: border-box; }
        
        #main-app { display: none; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--card); border-radius: 8px; border-bottom: 1px solid #333; margin-bottom: 12px; }
        .role-badge { font-size: 0.85rem; font-weight: 800; color: var(--gold); letter-spacing: 1px; border: 1px solid var(--gold); padding: 3px 12px; border-radius: 4px; }
        
        /* PANEL DE TIEMPO COMPACTO */
        .time-panel { display: flex; justify-content: space-between; align-items: center; padding: 8px 15px; background: rgba(255,255,255,0.02); border-radius: 8px; margin-bottom: 12px; border: 1px solid #222; }
        .time-item { text-align: center; }
        .time-label { font-size: 0.5rem; color: #777; display: block; text-transform: uppercase; margin-bottom: 2px; }
        .time-value { font-size: 0.8rem; font-weight: bold; }

        /* KPIs */
        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 12px; }
        .kpi-card { background: var(--card); padding: 10px 5px; border-radius: 8px; border-top: 2px solid var(--blue); text-align: center; }
        .kpi-val { font-size: 0.95rem; font-weight: bold; color: var(--green); }
        .kpi-card span { font-size: 0.45rem; color: #888; display: block; text-transform: uppercase; margin-bottom: 3px; }
        @keyframes blink { 0% { background: var(--card); } 50% { background: #4a0000; } 100% { background: var(--card); } }
        .alert-blink { animation: blink 1.2s infinite; border-top: 2px solid var(--red) !important; }

        /* PISTA */
        .race-track { background: #050505; border-radius: 12px; padding: 15px 0; border: 1px solid #222; position: relative; overflow: hidden; margin-bottom: 15px; }
        .line-meta { position: absolute; top: 0; bottom: 0; width: 1px; opacity: 0.3; z-index: 1; }
        .l-85 { left: 73.9%; border-left: 1px dashed var(--bronze); }
        .l-100 { left: 86.9%; border-left: 1px dashed white; }
        .l-115 { right: 0; width: 10px; background: repeating-linear-gradient(45deg, #fff, #fff 5px, #000 5px, #000 10px); opacity: 0.1; }
        .lane { height: 40px; position: relative; border-bottom: 1px solid #111; display: flex; align-items: center; }
        .v-name { width: 90px; font-size: 0.45rem; color: #666; padding-left: 8px; white-space: nowrap; overflow: hidden; font-weight: bold; }
        .truck { position: absolute; width: 42px; height: 24px; background-image: url('camion-intl.png'); background-size: contain; background-repeat: no-repeat; transition: 2.5s; z-index: 10; }
        .truck.bronce { filter: drop-shadow(0 0 5px var(--bronze)); }
        .truck.plata { filter: drop-shadow(0 0 8px var(--silver)); }
        .truck.oro { filter: drop-shadow(0 0 12px var(--gold)); }

        /* GRID Y CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 12px; }
        .card { background: var(--card); border-radius: 8px; padding: 12px; border: 1px solid #222; }
        h2 { font-size: 0.85rem; margin: 0 0 10px 0; text-transform: uppercase; color: var(--blue); letter-spacing: 0.5px; }

        /* INPUTS COMPACTOS */
        .input-compact { background: #000; border: 1px solid #333; color: #fff; padding: 6px 10px; border-radius: 4px; width: 100%; height: 32px; font-size: 0.75rem; margin-bottom: 8px; box-sizing: border-box; }
        .btn-action { background: var(--red); color: #fff; border: none; border-radius: 4px; font-size: 0.7rem; font-weight: bold; cursor: pointer; height: 32px; padding: 0 15px; text-transform: uppercase; }

        /* TOP 10 PROFESIONAL */
        .prod-row { display: flex; align-items: center; background: rgba(255,255,255,0.01); margin-bottom: 5px; padding: 8px; border-radius: 6px; border-left: 2px solid var(--gold); }
        .prod-rank { color: var(--gold); font-size: 0.9rem; font-weight: bold; width: 20px; text-align: center; margin-right: 10px; }
        .prod-info { flex: 1; line-height: 1.2; }
        .prod-info b { font-size: 0.75rem; color: #fff; }
        .prod-info small { color: #555; margin-left: 4px; font-size: 0.65rem; }
        .prod-stat { text-align: right; line-height: 1.2; }
        .prod-stat b { font-size: 0.75rem; color: var(--green); display: block; }
        .prod-stat small { font-size: 0.6rem; color: #444; }

        /* BITACORA */
        .seg-item { border-left: 3px solid var(--blue); background: rgba(0,0,0,0.3); padding: 10px; margin-bottom: 8px; border-radius: 4px; font-size: 0.7rem; }
        
        /* SEMAFORO CARTERA */
        .client-item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #222; font-size: 0.7rem; }
        .semaforo-mini { display: flex; flex-direction: column; gap: 2px; margin-right: 10px; width: 8px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #222; }
        .dot.active.verde { background: #0f0; box-shadow: 0 0 4px #0f0; }
        .dot.active.ambar { background: #ff0; box-shadow: 0 0 4px #ff0; }
        .dot.active.rojo { background: #f00; box-shadow: 0 0 4px #f00; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <img src="logo-catosa.png" style="max-height: 30px; margin-bottom: 20px;">
            <input type="text" id="u-role" placeholder="USUARIO">
            <input type="password" id="u-pass" placeholder="CONTRASEÑA">
            <button class="btn-action" style="width:100%" onclick="login()">ACCEDER AL SISTEMA</button>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <img src="logo-catosa.png" style="max-height: 20px;">
            <div id="role-display" class="role-badge">--</div>
            <button class="btn-action" style="background:none; border:1px solid var(--red); color:var(--red); height: 26px; padding: 0 10px;" onclick="location.reload()">SALIR</button>
        </div>

        <div class="time-panel">
            <div class="time-item"><span class="time-label">Corte</span><span class="time-value" id="val-hoy">--</span></div>
            <div class="time-item"><span class="time-label">Días restantes</span><span class="time-value" id="val-dias" style="color: var(--red);">--</span></div>
            <div class="time-item"><span class="time-label">Faltante Oro</span><span class="time-value" id="val-falta-oro" style="color: var(--gold);">$0</span></div>
        </div>

        <div class="kpi-row">
            <div class="kpi-card"><span>Venta Total</span><div class="kpi-val" id="g-v">$0</div></div>
            <div class="kpi-card" id="card-falta"><span>Falta Plata</span><div class="kpi-val" id="g-falta" style="color:var(--text)">$0</div></div>
            <div class="kpi-card"><span>% Plata</span><div class="kpi-val" id="g-p-plata" style="color:var(--blue)">0%</div></div>
            <div class="kpi-card"><span>% Oro</span><div class="kpi-val" id="g-p-oro" style="color:var(--gold)">0%</div></div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px; margin-bottom:12px;">
            <select id="f-suc" class="input-compact" onchange="render()"><option value="TODAS">SUCURSAL: TODAS</option></select>
            <select id="f-vend" class="input-compact" onchange="render()"><option value="TODOS">VENDEDOR: TODOS</option></select>
            <button class="btn-action" style="background:var(--green); color:#000;" onclick="exportCartera()">EXPORTAR CARTERA</button>
        </div>

        <div class="race-track">
            <div class="line-meta l-85"></div><div class="line-meta l-100"></div><div class="line-meta l-115"></div>
            <div id="pista"></div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>📈 Gráfica Comparativa</h2>
                <canvas id="salesChart" style="max-height: 200px;"></canvas>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <h2 style="margin:0;">📅 Bitácora de Campo</h2>
                    <div>
                        <a href="https://docs.google.com/spreadsheets/d/1vUYJz5r1kgMNDel9-6LqaiKAeb3g_n0JwS5_Hs59yeM/edit" target="_blank" style="color:var(--green); font-size:0.6rem; text-decoration:none; margin-right:10px;">SHEETS</a>
                        <span onclick="exportBitacora()" style="color:var(--blue); font-size:0.6rem; cursor:pointer;">CSV</span>
                    </div>
                </div>
                <div id="seg-list" style="max-height: 250px; overflow-y: auto;"></div>
            </div>

            <div class="card">
                <h2>📦 Monitor de Almacén</h2>
                <input type="text" class="input-compact" placeholder="Filtrar SKU o Marca..." oninput="checkInventory(this.value)">
                <div id="inv-res" style="max-height: 200px; overflow-y: auto;"></div>
            </div>

            <div class="card">
                <h2>🔥 Top 10 Productos</h2>
                <div id="top-prod-list" style="max-height: 250px; overflow-y: auto;"></div>
            </div>

            <div class="card">
                <h2>👥 Cartera Semáforo</h2>
                <div style="display:grid; grid-template-columns: 80px 1fr; gap:5px; margin-bottom:8px;">
                    <select id="f-col-car" class="input-compact" onchange="render()"><option value="TODOS">TODO</option><option value="VERDE">VERDE</option><option value="AMBAR">AMBAR</option><option value="ROJO">ROJO</option></select>
                    <input type="text" id="f-cli-car" class="input-compact" placeholder="Buscar cliente..." oninput="render()">
                </div>
                <div id="cli-list" style="max-height: 200px; overflow-y: auto;"></div>
            </div>

            <div class="card">
                <h2>🏆 Ranking Efectividad</h2>
                <div id="rank-list" style="max-height: 200px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <script>
        const L = {
            v: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=0&single=true&output=csv",
            c: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1068966462&single=true&output=csv",
            s: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=480185164&single=true&output=csv",
            p: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1610979668&single=true&output=csv",
            det: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1262272182&single=true&output=csv"
        };
        let dbV=[], dbC=[], dbS=[], dbP=[], dbD=[], myChart=null;

        function login() {
            const u = document.getElementById('u-role').value.toUpperCase(), p = document.getElementById('u-pass').value;
            if((u==='GERENTE'||u==='DIRECTOR') && (p==='CATOSA2026'||p==='MASTER2026')) {
                document.getElementById('login-screen').style.display='none'; document.getElementById('main-app').style.display='block';
                document.getElementById('role-display').innerText = u; loadData();
            } else alert("Acceso denegado");
        }

        function loadData() {
            Papa.parse(L.p, { download:true, header:true, complete: r => {
                dbP = r.data; checkInventory("");
                Papa.parse(L.v, { download:true, header:true, complete: r => { dbV=r.data; fillFilters(); render(); } });
                Papa.parse(L.c, { download:true, header:true, complete: r => { dbC=r.data; render(); } });
                Papa.parse(L.s, { download:true, header:true, complete: r => { dbS=r.data; render(); } });
                Papa.parse(L.det, { download:true, header:true, complete: r => { dbD=r.data; calcTopProducts(); } });
            }});
        }

        function fillFilters() {
            const s = document.getElementById('f-suc'), v = document.getElementById('f-vend');
            [...new Set(dbV.map(x=>x.Sucursal))].filter(x=>x).forEach(x=>s.innerHTML+=`<option value="${x}">${x}</option>`);
            dbV.filter(x=>x.Nombre).forEach(x=>v.innerHTML+=`<option value="${x.Nombre}">${x.Nombre}</option>`);
        }

        function render() {
            const fs = document.getElementById('f-suc').value, fv = document.getElementById('f-vend').value;
            const pista = document.getElementById('pista'); pista.innerHTML = '';
            let tv=0, tm=0, labs=[], vdat=[], mdat=[], ranking={};

            const hoy = new Date(), uDia = new Date(hoy.getFullYear(), hoy.getMonth() + 1, 0).getDate(), dR = (uDia - hoy.getDate()) + 1;
            document.getElementById('val-hoy').innerText = hoy.toLocaleDateString('es-MX', {day:'numeric', month:'short'}).toUpperCase();
            document.getElementById('val-dias').innerText = dR + (dR === 1 ? " Día" : " Días");
            if(dR <= 5) document.getElementById('card-falta').classList.add('alert-blink');

            const filteredV = dbV.filter(v => v.Nombre && (fs==='TODAS'||v.Sucursal===fs) && (fv==='TODOS'||v.Nombre===fv));
            
            filteredV.forEach(v => {
                const ven = parseFloat(v.Ventas.replace(/[^0-9.]/g,''))||0, met = parseFloat(v.Meta.replace(/[^0-9.]/g,''))||1;
                tv += ven; tm += met;
                const pct = (ven/met)*100, pos = Math.min(100, (pct/115)*100);
                let rc = pct>=115 ? 'oro' : (pct>=100 ? 'plata' : (pct>=85 ? 'bronce' : ''));
                pista.innerHTML += `<div class="lane"><small class="v-name">${v.Nombre}</small><div class="truck ${rc}" style="left:calc(${pos}% - 42px)"></div></div>`;
                labs.push(v.Nombre); vdat.push(ven); mdat.push(met);
            });

            document.getElementById('g-v').innerText="$"+Math.floor(tv).toLocaleString();
            document.getElementById('g-falta').innerText="$"+Math.max(0, Math.floor(tm - tv)).toLocaleString();
            document.getElementById('g-p-plata').innerText=((tv/tm)*100 || 0).toFixed(1)+"%";
            document.getElementById('g-p-oro').innerText=((tv/(tm*1.15))*100 || 0).toFixed(1)+"%";
            document.getElementById('val-falta-oro').innerText = "$" + Math.max(0, Math.floor(tm*1.15 - tv)).toLocaleString();

            if(myChart) myChart.destroy();
            myChart = new Chart(document.getElementById('salesChart'), { type:'bar', data:{ labels:labs, datasets:[{label:'Venta', data:vdat, backgroundColor:'#00d4ff'},{label:'Meta', data:mdat, backgroundColor:'#333'}] }, options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}} });

            const bl = document.getElementById('seg-list'); bl.innerHTML = '';
            dbS.filter(s => fv==='TODOS'||s.Vendedor===fv).slice().reverse().slice(0,10).forEach(s => {
                bl.innerHTML += `<div class="seg-item"><b>${s.Vendedor}</b> ⮕ ${s.Cliente}<br><small>👤 ${s.Atendio} | 💡 ${s.Motivo} | 🎯 ${s.Resultado}</small></div>`;
            });

            const cl = document.getElementById('cli-list'), fCol = document.getElementById('f-col-car').value, fCli = document.getElementById('f-cli-car').value.toLowerCase();
            cl.innerHTML = '';
            dbC.filter(c => (fs==='TODAS'||c.Sucursal===fs) && (fv==='TODOS'||c.Vendedor===fv)).forEach(c => {
                const d = parseInt(c.Dias)||0;
                const match = (fCol==='TODOS'||(fCol==='VERDE'&&d<=14)||(fCol==='AMBAR'&&d>14&&d<=60)||(fCol==='ROJO'&&d>60));
                if(match) {
                    if(!ranking[c.Vendedor]) ranking[c.Vendedor] = 0; ranking[c.Vendedor]++;
                    if(c.Cliente.toLowerCase().includes(fCli)) {
                        cl.innerHTML += `<div class="client-item"><div class="semaforo-mini"><div class="dot active ${d<=14?'verde':(d<=60?'ambar':'rojo')}"></div></div><div style="flex:1"><b>${c.Cliente}</b><br><small>${c.Vendedor} (${d}d)</small></div><b>$${Math.floor(parseFloat(c.Venta_Mes)||0).toLocaleString()}</b></div>`;
                    }
                }
            });

            const rl = document.getElementById('rank-list'); rl.innerHTML = '';
            Object.entries(ranking).sort((a,b)=>b[1]-a[1]).slice(0,10).forEach(([n,c],i) => {
                rl.innerHTML += `<div style="display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid #222; font-size:0.75rem;"><span>${i+1}. ${n}</span><b style="color:var(--green)">${c} Ctas</b></div>`;
            });
        }

        function checkInventory(q) {
            const box = document.getElementById('inv-res');
            let list = q ? dbP.filter(p => (p.Parte||'').toUpperCase().includes(q.toUpperCase()) || (p.Marca||'').toUpperCase().includes(q.toUpperCase())) : dbP.filter(p => parseInt(p.Existencia) <= 3);
            box.innerHTML = q ? '' : '<div style="font-size:0.55rem; color:var(--gold); text-align:center; margin-bottom:5px;">STOCK BAJO</div>';
            list.slice(0,15).forEach(p => {
                const qty = parseInt(p.Existencia)||0;
                box.innerHTML += `<div style="display:flex; justify-content:space-between; padding:6px; border-bottom:1px solid #222; font-size:0.7rem;"><div><b>${p.Parte}</b><small> (${p.Marca})</small></div><b style="color:${qty<=0?'var(--red)':'var(--green)'}">${qty} pz</b></div>`;
            });
        }

        function calcTopProducts() {
            const list = document.getElementById('top-prod-list'); 
            let counts = {};
            dbD.forEach(v => { const p = (v.Parte||v.SKU||"").toString().trim().toUpperCase(); if(p && p !== "PARTE") counts[p] = (counts[p]||0) + parseInt(v.Cantidad||1); });
            const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,10);
            list.innerHTML = '';
            sorted.forEach(([sku, qty], i) => {
                const sInfo = dbP.find(p => (p.Parte||"").toString().trim().toUpperCase() === sku);
                const sQty = sInfo ? parseInt(sInfo.Existencia) : 0;
                list.innerHTML += `<div class="prod-row"><div class="prod-rank">${i+1}</div><div class="prod-info"><b>${sku}</b><small>${sInfo?sInfo.Marca:'FLEETRITE'}</small></div><div class="prod-stat"><b>${qty} vendidos</b><small style="color:${sQty<=5?'var(--red)':'var(--green)'}">${sQty} stock</small></div></div>`;
            });
        }

        function exportCartera() { let csv = "Cliente,Vendedor,Sucursal,Dias\n"; dbC.forEach(c => csv += `"${c.Cliente}","${c.Vendedor}","${c.Sucursal}","${c.Dias}"\n`); const blob = new Blob([csv], {type:'text/csv'}); const link = document.createElement("a"); link.href=URL.createObjectURL(blob); link.download="Cartera_Catosa.csv"; link.click(); }
        function exportBitacora() { let csv = "Vendedor,Cliente,Atendio,Motivo,Resultado,Notas\n"; dbS.forEach(s => csv += `"${s.Vendedor}","${s.Cliente}","${s.Atendio}","${s.Motivo}","${s.Resultado}","${s.Notas}"\n`); const blob = new Blob([csv], {type:'text/csv'}); const link = document.createElement("a"); link.href=URL.createObjectURL(blob); link.download="Bitacora_Catosa.csv"; link.click(); }
    </script>
</body>
</html>
