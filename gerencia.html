<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catosa GP - Gerencia Master</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --red: #d21034; --bg: #0c0e10; --card: #1a1d20; --green: #00ff88; --blue: #00d4ff; --text: #f5f5f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card); border-radius: 10px; margin-bottom: 20px; border-bottom: 2px solid #333; }
        
        /* KPIs */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; border-top: 3px solid var(--blue); text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .stat-val { font-size: 1.5rem; font-weight: bold; color: var(--green); display: block; margin: 5px 0; }
        .stat-label { font-size: 0.6rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
        h2 { font-size: 0.75rem; color: var(--blue); text-transform: uppercase; border-bottom: 1px solid #444; padding-bottom: 10px; margin-top: 0; margin-bottom: 15px; }

        /* PISTA */
        .lane { height: 50px; border-bottom: 1px dashed #222; position: relative; display: flex; align-items: center; }
        .v-name { width: 100px; font-size: 0.6rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .truck { position: absolute; bottom: 8px; width: 60px; height: 30px; background-image: url('camion-intl.png'); background-size: contain; background-repeat: no-repeat; transition: 2s ease-in-out; filter: drop-shadow(0 0 5px var(--green)); }

        /* LISTA SEGUIMIENTO */
        .seg-item { border-left: 4px solid var(--blue); background: rgba(255,255,255,0.03); padding: 15px; margin-bottom: 12px; border-radius: 0 8px 8px 0; border-bottom: 1px solid #222; }
        .seg-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .seg-client { color: var(--blue); font-weight: bold; font-size: 0.9rem; }
        .seg-date { font-size: 0.7rem; color: #777; }
        .seg-notes { font-size: 0.75rem; color: #ccc; font-style: italic; margin-top: 8px; background: #000; padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo-catosa.png" style="max-height: 25px;">
        <h1 style="font-size: 0.7rem; letter-spacing: 4px; margin: 0;">GP GERENCIA MASTER</h1>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--red); font-weight:bold; cursor:pointer; font-size:0.6rem;">ACTUALIZAR</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-label">Venta Global</span>
            <span class="stat-val" id="g-v">$0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Utilidad Real</span>
            <span class="stat-val" id="g-u">$0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Margen Global</span>
            <span class="stat-val" id="g-m">0%</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Alcance Meta</span>
            <span class="stat-val" id="g-p">0%</span>
        </div>
    </div>

    <div class="card">
        <h2>🏎️ Carrera de Asesores (Ventas en Vivo)</h2>
        <div id="pista"></div>
    </div>

    <div class="card">
        <h2>📅 Bitácora de Seguimiento Clientes</h2>
        <div id="seguimiento-list">Cargando reportes de campo...</div>
    </div>

    <script>
        // LINKS DE LAS PESTAÑAS
        const L = {
            vendedores: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=0&single=true&output=csv",
            seguimiento: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=480185164&single=true&output=csv"
        };

        window.onload = () => {
            // Cargar datos de ventas
            Papa.parse(L.vendedores, { 
                download: true, 
                header: true, 
                complete: r => renderStats(r.data) 
            });

            // Cargar datos de seguimiento
            Papa.parse(L.seguimiento, { 
                download: true, 
                header: true, 
                complete: r => renderSeguimiento(r.data) 
            });
        };

        function renderStats(data) {
            let tv = 0, tu = 0, tm = 0;
            const p = document.getElementById('pista');
            p.innerHTML = '';
            
            data.filter(v => v.Nombre).forEach(v => {
                const ven = parseFloat(v.Ventas.replace(/[^0-9.]/g, '')) || 0;
                const met = parseFloat(v.Meta.replace(/[^0-9.]/g, '')) || 1;
                const uti = parseFloat(v.Utilidad.replace(/[^0-9.]/g, '')) || (ven * 0.22);
                
                tv += ven; tm += met; tu += uti;
                const pct = Math.min(100, (ven / met) * 100);
                
                p.innerHTML += `
                    <div class="lane">
                        <div class="v-name">${v.Nombre}</div>
                        <div class="truck" style="left:calc(${pct}% - 60px)"></div>
                    </div>`;
            });

            document.getElementById('g-v').innerText = "$" + Math.floor(tv).toLocaleString();
            document.getElementById('g-u').innerText = "$" + Math.floor(tu).toLocaleString();
            document.getElementById('g-m').innerText = ((tu / tv) * 100 || 0).toFixed(1) + "%";
            document.getElementById('g-p').innerText = ((tv / tm) * 100 || 0).toFixed(1) + "%";
        }

        function renderSeguimiento(data) {
            const sl = document.getElementById('seguimiento-list');
            sl.innerHTML = '';
            
            // Reversa para ver lo más nuevo primero
            const logs = data.filter(s => s.Vendedor).reverse();

            if(logs.length === 0) {
                sl.innerHTML = "No hay registros de seguimiento aún.";
                return;
            }

            logs.forEach(s => {
                sl.innerHTML += `
                    <div class="seg-item">
                        <div class="seg-header">
                            <span class="seg-client">${s.Cliente}</span>
                            <span class="seg-date">${s["Fecha Efectuada"]} | ${s.Horario}</span>
                        </div>
                        <div style="font-size:0.8rem;">
                            <b>Asesor:</b> ${s.Vendedor} | <b>Resultado:</b> ${s.Resultado}
                        </div>
                        <div class="seg-notes">
                            "${s.Notas}"
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
