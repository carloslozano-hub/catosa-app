<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catosa GP - Gerencia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --red: #d21034; --bg: #222629; --card: #1a1d20; --green: #00ff88; --blue: #00d4ff; --text: #f5f5f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        
        /* LOGIN */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; border-top: 5px solid var(--red); text-align: center; width: 85%; max-width: 350px; }
        #main-app { display: none; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card); border-radius: 10px; margin-bottom: 20px; border-bottom: 2px solid #444; }
        .logo { max-height: 25px; }

        .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .kpi-card { background: var(--card); padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        .kpi-val { font-size: 1.2rem; font-weight: bold; color: var(--green); margin-top: 5px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 10px; padding: 15px; border: 1px solid #333; }
        h2 { font-size: 0.7rem; color: var(--blue); text-transform: uppercase; border-bottom: 1px solid #444; padding-bottom: 8px; }

        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th { text-align: left; color: #666; padding: 8px; border-bottom: 1px solid #444; }
        td { padding: 8px; border-bottom: 1px solid #222; }

        .cli-row { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #222; font-size: 0.75rem; }
        .light { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; }

        .btn { padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color: #fff; width: 100%; }
        input { width: 100%; background: #000; border: 1px solid #333; padding: 10px; border-radius: 6px; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
        select { width: 100%; background: #000; color: #fff; padding: 10px; border-radius: 6px; border: 1px solid var(--blue); margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="font-size: 0.9rem; letter-spacing: 2px; color: #fff;">GERENCIA CATOSA</h2>
            <input type="text" id="admin-user" placeholder="USUARIO">
            <input type="password" id="admin-pass" placeholder="CONTRASEÑA">
            <button class="btn" style="background:var(--red)" onclick="checkLogin()">ENTRAR</button>
            <p id="error" style="color:var(--red); font-size:0.6rem; margin-top:10px; display:none;">Datos incorrectos</p>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <img src="logo-catosa.png" class="logo" onerror="this.style.display='none'">
            <h1 style="font-size: 0.7rem; margin:0;">PANEL DE CONTROL</h1>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--red); cursor:pointer; font-size:0.6rem;">CERRAR</button>
        </div>

        <select id="select-sucursal" onchange="renderAdmin()">
            <option value="TODAS">--- TODAS LAS SUCURSALES ---</option>
        </select>

        <div class="kpi-row">
            <div class="kpi-card"><div>VENTA TOTAL</div><div class="kpi-val" id="total-v">$0</div></div>
            <div class="kpi-card"><div>UTILIDAD EST.</div><div class="kpi-val" id="total-u">$0</div></div>
            <div class="kpi-card"><div>ALCANCE</div><div class="kpi-val" id="total-p">0%</div></div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>📊 Ranking Asesores</h2>
                <table id="tabla-ranking">
                    <thead><tr><th>Asesor</th><th>Venta</th><th>%</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="card">
                <h2>⚠️ Alertas Cartera</h2>
                <input type="text" id="search-cli" placeholder="Buscar cliente..." oninput="renderAdmin()">
                <div id="cartera-global" style="max-height: 300px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <script>
        // Enlace forzado
        const URL_CSV = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=0&single=true&output=csv&t=${new Date().getTime()}`;
        let db = [];

        // Función de extracción robusta
        function getV(obj, idx) {
            const keys = Object.keys(obj);
            return obj[keys[idx]] || "";
        }

        window.onload = () => {
            Papa.parse(URL_CSV, { 
                download: true, 
                header: true, 
                complete: (r) => { 
                    db = r.data; 
                    // Llenar sucursales
                    const s = document.getElementById('select-sucursal');
                    const sucs = [...new Set(db.map(f => getV(f, 5)))].filter(x => x); // Asumimos columna 5 es sucursal
                    sucs.forEach(x => { s.innerHTML += `<option value="${x}">${x}</option>`; });
                } 
            });
        };

        function checkLogin() {
            const u = document.getElementById('admin-user').value.toUpperCase();
            const p = document.getElementById('admin-pass').value;
            // Login forzado para que no falle
            if(u === 'GERENTE' && p === 'CATOSA2026') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                renderAdmin();
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }

        function renderAdmin() {
            const tbody = document.querySelector('#tabla-ranking tbody');
            const cart = document.getElementById('cartera-global');
            const fSuc = document.getElementById('select-sucursal').value;
            const fCli = document.getElementById('search-cli').value.toLowerCase();
            
            tbody.innerHTML = ''; cart.innerHTML = '';
            let sV = 0, sM = 0;

            // Procesar Ranking
            const nombres = [...new Set(db.map(f => getV(f, 0)))].filter(x => x);
            nombres.forEach(n => {
                const d = db.find(x => getV(x, 0) === n);
                const suc = getV(d, 5);
                if(fSuc === 'TODAS' || suc === fSuc) {
                    const v = parseFloat(getV(d, 1)) || 0;
                    const m = parseFloat(getV(d, 2)) || 1;
                    sV += v; sM += m;
                    tbody.innerHTML += `<tr><td>${n}</td><td>$${v.toLocaleString()}</td><td style="color:${(v/m)>=1?'#0f0':'#f44'}">${((v/m)*100).toFixed(0)}%</td></tr>`;
                }
            });

            // Procesar Cartera
            db.forEach(f => {
                const cli = getV(f, 3);
                const dias = parseInt(getV(f, 4)) || 0;
                const suc = getV(f, 5);
                if(cli && (fSuc === 'TODAS' || suc === fSuc) && cli.toLowerCase().includes(fCli)) {
                    let c = dias <= 14 ? '#0f0' : (dias <= 60 ? '#ff0' : '#f00');
                    cart.innerHTML += `<div class="cli-row"><div class="light" style="background:${c}; color:${c}"></div><div><b>${cli}</b><br><small>${getV(f,0)} | ${dias} d</small></div></div>`;
                }
            });

            document.getElementById('total-v').innerText = "$" + Math.floor(sV).toLocaleString();
            document.getElementById('total-u').innerText = "$" + Math.floor(sV * 0.25).toLocaleString();
            document.getElementById('total-p').innerText = ((sV/sM)*100).toFixed(1) + "%";
        }
    </script>
</body>
</html>
