<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catosa GP - Máster Gerencia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --red: #d21034; --bg: #0c0e10; --card: #1a1d20; --green: #00ff88; --blue: #00d4ff; --text: #f5f5f5; --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; border-top: 5px solid var(--red); text-align: center; width: 300px; }
        #main-app { display: none; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--card); border-radius: 10px; border-bottom: 2px solid #333; margin-bottom: 15px; }
        .role-badge { font-size: 1rem; font-weight: 900; color: var(--gold); letter-spacing: 2px; border: 2px solid var(--gold); padding: 5px 15px; border-radius: 5px; }
        
        /* PANEL DE TIEMPO */
        .time-panel { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        .time-item { text-align: center; flex: 1; }
        .time-label { font-size: 0.55rem; color: #888; display: block; text-transform: uppercase; }
        .time-value { font-size: 0.9rem; font-weight: bold; }

        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .kpi-card { background: var(--card); padding: 12px; border-radius: 10px; border-top: 3px solid var(--blue); text-align: center; }
        .kpi-val { font-size: 1rem; font-weight: bold; color: var(--green); }
        .kpi-card span { font-size: 0.5rem; color: #888; text-transform: uppercase; display: block; }
        @keyframes blink { 0% { background: var(--card); } 50% { background: #4a0000; } 100% { background: var(--card); } }
        .alert-blink { animation: blink 1s infinite; border-top: 3px solid var(--red) !important; }

        /* PISTA Y METAS */
        .race-track { background: #050505; border-radius: 15px; padding: 15px 0; border: 1px solid #333; position: relative; overflow: hidden; margin-bottom: 20px; }
        .line-meta { position: absolute; top: 0; bottom: 0; width: 1px; opacity: 0.4; z-index: 1; }
        .l-85 { left: 73.9%; border-left: 1px dashed var(--bronze); }
        .l-100 { left: 86.9%; border-left: 2px dashed white; }
        .l-115 { right: 0; width: 15px; background: repeating-linear-gradient(45deg, #fff, #fff 5px, #000 5px, #000 10px); opacity: 0.2; border-left: 2px solid var(--gold); }
        .lane { height: 45px; position: relative; border-bottom: 1px dashed #222; display: flex; align-items: center; }
        .v-name { width: 100px; font-size: 0.5rem; color: #888; padding-left: 10px; white-space: nowrap; overflow: hidden; }
        .truck { position: absolute; width: 50px; height: 28px; background-image: url('camion-intl.png'); background-size: contain; background-repeat: no-repeat; transition: 2s; z-index: 10; }
        .truck.bronce { filter: drop-shadow(0 0 8px var(--bronze)); }
        .truck.plata { filter: drop-shadow(0 0 12px var(--silver)); }
        .truck.oro { filter: drop-shadow(0 0 18px var(--gold)); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #333; }

        /* TOP PRODUCTOS */
        .prod-row { display: flex; align-items: center; background: rgba(255,255,255,0.02); margin-bottom: 8px; padding: 10px; border-radius: 8px; }
        .prod-rank { color: var(--gold); font-size: 1.1rem; font-weight: 900; margin-right: 15px; width: 20px; border-left: 3px solid var(--gold); padding-left: 8px; }
        .prod-info { flex: 1; }
        .prod-stat { text-align: right; }

        /* BITACORA */
        .seg-item { border-left: 4px solid var(--blue); background: #000; padding: 12px; margin-bottom: 10px; border-radius: 0 8px 8px 0; font-size: 0.75rem; line-height: 1.5; }
        
        /* CARTERA SEMAFORO */
        .client-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; font-size: 0.75rem; }
        .semaforo-mini { display: flex; flex-direction: column; gap: 2px; margin-right: 15px; width: 12px; }
        .dot-light { width: 10px; height: 10px; border-radius: 50%; background: #222; }
        .dot-light.active.verde { background: #0f0; box-shadow: 0 0 5px #0f0; }
        .dot-light.active.ambar { background: #ff0; box-shadow: 0 0 5px #ff0; }
        .dot-light.active.rojo { background: #f00; box-shadow: 0 0 5px #f00; }

        input, select { background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-size: 0.8rem; }
        .btn { padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: #fff; background: var(--red); text-transform: uppercase; font-size: 0.7rem; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box"><img src="logo-catosa.png" style="max-height: 40px; margin-bottom: 20px;"><input type="text" id="u-role" placeholder="USUARIO"><input type="password" id="u-pass" placeholder="PASSWORD"><button class="btn" style="width:100%" onclick="login()">ENTRAR</button></div>
    </div>

    <div id="main-app">
        <div class="header">
            <img src="logo-catosa.png" style="max-height: 25px;">
            <div id="role-display" class="role-badge">--</div>
            <button class="btn" style="background:none; border:1px solid var(--red); color:var(--red);" onclick="location.reload()">SALIR</button>
        </div>

        <div class="time-panel">
            <div class="time-item"><span class="time-label">Hoy</span><span class="time-value" id="val-hoy">--</span></div>
            <div class="time-item" style="border-left: 1px solid #333; border-right: 1px solid #333;"><span class="time-label">Cierre en</span><span class="time-value" id="val-dias" style="color: var(--red);">--</span></div>
            <div class="time-item"><span class="time-label">Falta para Oro</span><span class="time-value" id="val-falta-oro" style="color: var(--gold);">$0</span></div>
        </div>

        <div class="kpi-row">
            <div class="kpi-card"><span>Venta Global</span><div class="kpi-val" id="g-v">$0</div></div>
            <div class="kpi-card" id="card-falta"><span>Falta Plata</span><div class="kpi-val" id="g-falta" style="color:var(--text)">$0</div></div>
            <div class="kpi-card"><span>Alcance Plata</span><div class="kpi-val" id="g-p-plata" style="color:var(--blue)">0%</div></div>
            <div class="kpi-card"><span>Alcance Oro</span><div class="kpi-val" id="g-p-oro" style="color:var(--gold)">0%</div></div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:15px;">
            <select id="f-suc" onchange="render()"><option value="TODAS">SUCURSAL: TODAS</option></select>
            <select id="f-vend" onchange="render()"><option value="TODOS">VENDEDOR: TODOS</option></select>
            <button class="btn" style="background:var(--green); color:#000;" onclick="exportCartera()">EXPORTAR CARTERA</button>
        </div>

        <div class="race-track">
            <div class="line-meta l-85"></div><div class="line-meta l-100"></div><div class="line-meta l-115"></div>
            <div id="pista"></div>
        </div>

        <div class="grid">
            <div class="card"><h2>📈 Avance de Ventas</h2><canvas id="salesChart" style="max-height: 250px;"></canvas></div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <h2 style="margin:0;">📅 Bitácora</h2>
                    <button class="btn" style="background:var(--blue); padding:5px 10px;" onclick="exportBitacora()">Exportar CSV</button>
                </div>
                <div id="seg-list" style="max-height: 300px; overflow-y: auto;"></div>
            </div>

            <div class="card">
                <h2>📦 Almacén Inteligente</h2>
                <input type="text" placeholder="Buscar SKU o Marca..." oninput="checkInventory(this.value)">
                <div id="inv-res" style="max-height: 250px; overflow-y: auto;"></div>
            </div>

            <div class="card"><h2>🔥 Top 10 Productos</h2><div id="top-prod-list" style="max-height: 350px; overflow-y: auto;"></div></div>

            <div class="card">
                <h2>👥 Cartera Semáforo</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-bottom:10px;">
                    <select id="f-col-car" onchange="render()"><option value="TODOS">TODOS</option><option value="VERDE">VERDE</option><option value="AMBAR">AMBAR</option><option value="ROJO">ROJO</option></select>
                    <input type="text" id="f-cli-car" placeholder="Filtrar cliente..." oninput="render()">
                </div>
                <div id="cli-list" style="max-height: 300px; overflow-y: auto;"></div>
            </div>

            <div class="card"><h2>🏆 Ranking Semáforo</h2><div id="rank-list" style="max-height: 250px; overflow-y: auto;"></div></div>
        </div>
    </div>

    <script>
        const L = {
            v: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=0&single=true&output=csv",
            c: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1068966462&single=true&output=csv",
            s: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=480185164&single=true&output=csv",
            p: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1610979668&single=true&output=csv",
            det: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1262272182&single=true&output=csv"
        };
        let dbV=[], dbC=[], dbS=[], dbP=[], dbD=[], myChart=null;

        function login() {
            const u = document.getElementById('u-role').value.toUpperCase(), p = document.getElementById('u-pass').value;
            if((u==='GERENTE'||u==='DIRECTOR') && (p==='CATOSA2026'||p==='MASTER2026')) {
                document.getElementById('login-screen').style.display='none'; 
                document.getElementById('main-app').style.display='block';
                document.getElementById('role-display').innerText = u;
                loadData();
            } else alert("Acceso denegado");
        }

        function loadData() {
            // Carga Secuencial para asegurar el stock
            Papa.parse(L.p, { download:true, header:true, complete: r => {
                dbP = r.data;
                checkInventory("");
                Papa.parse(L.v, { download:true, header:true, complete: r => { dbV=r.data; fillFilters(); render(); } });
                Papa.parse(L.c, { download:true, header:true, complete: r => { dbC=r.data; render(); } });
                Papa.parse(L.s, { download:true, header:true, complete: r => { dbS=r.data; render(); } });
                Papa.parse(L.det, { download:true, header:true, complete: r => { dbD=r.data; calcTopProducts(); } });
            }});
        }

        function fillFilters() {
            const s = document.getElementById('f-suc'), v = document.getElementById('f-vend');
            [...new Set(dbV.map(x=>x.Sucursal))].filter(x=>x).forEach(x=>s.innerHTML+=`<option value="${x}">${x}</option>`);
            dbV.filter(x=>x.Nombre).forEach(x=>v.innerHTML+=`<option value="${x.Nombre}">${x.Nombre}</option>`);
        }

        function render() {
            const fs = document.getElementById('f-suc').value, fv = document.getElementById('f-vend').value;
            const pista = document.getElementById('pista'); pista.innerHTML = '';
            let tv=0, tm=0, labs=[], vdat=[], mdat=[], ranking={};

            // PANEL DE TIEMPO
            const hoy = new Date(), uDia = new Date(hoy.getFullYear(), hoy.getMonth() + 1, 0).getDate(), dR = (uDia - hoy.getDate()) + 1;
            document.getElementById('val-hoy').innerText = hoy.toLocaleDateString('es-MX', {day:'numeric', month:'short'}).toUpperCase();
            document.getElementById('val-dias').innerText = dR + (dR === 1 ? " Día" : " Días");
            if(dR <= 5) document.getElementById('card-falta').classList.add('alert-blink');

            // PISTA Y VEND
            dbV.filter(v => v.Nombre && (fs==='TODAS'||v.Sucursal===fs) && (fv==='TODOS'||v.Nombre===fv)).forEach(v => {
                const ven = parseFloat(v.Ventas.replace(/[^0-9.]/g,''))||0, met = parseFloat(v.Meta.replace(/[^0-9.]/g,''))||1;
                tv += ven; tm += met;
                const pct = (ven/met)*100, pos = Math.min(100, (pct/115)*100);
                let rc = pct>=115 ? 'oro' : (pct>=100 ? 'plata' : (pct>=85 ? 'bronce' : ''));
                pista.innerHTML += `<div class="lane"><small class="v-name">${v.Nombre}</small><div class="truck ${rc}" style="left:calc(${pos}% - 50px)"></div></div>`;
                labs.push(v.Nombre); vdat.push(ven); mdat.push(met);
            });

            document.getElementById('g-v').innerText="$"+Math.floor(tv).toLocaleString();
            document.getElementById('g-falta').innerText="$"+Math.max(0, Math.floor(tm - tv)).toLocaleString();
            document.getElementById('g-p-plata').innerText=((tv/tm)*100 || 0).toFixed(1)+"%";
            document.getElementById('g-p-oro').innerText=((tv/(tm*1.15))*100 || 0).toFixed(1)+"%";
            document.getElementById('val-falta-oro').innerText = "$" + Math.max(0, Math.floor(tm*1.15 - tv)).toLocaleString();

            // GRAFICA
            if(myChart) myChart.destroy();
            myChart = new Chart(document.getElementById('salesChart'), { type:'bar', data:{ labels:labs, datasets:[{label:'Venta', data:vdat, backgroundColor:'#00d4ff'},{label:'Meta', data:mdat, backgroundColor:'#333'}] } });

            // BITACORA
            const bl = document.getElementById('seg-list'); bl.innerHTML = '';
            dbS.filter(s => fv==='TODOS'||s.Vendedor===fv).slice().reverse().slice(0,20).forEach(s => {
                bl.innerHTML += `<div class="seg-item"><b>VENDEDOR:</b> ${s.Vendedor}<br><b>CLIENTE:</b> ${s.Cliente}<br><small><b>ATENDIÓ:</b> ${s.Atendio} | <b>MOTIVO:</b> ${s.Motivo}</small><br><small><b>RESULTADO:</b> ${s.Resultado}</small><br><small><b>NOTAS:</b> ${s.Notas}</small></div>`;
            });

            // CARTERA SEMAFORO
            const cl = document.getElementById('cli-list'), fCol = document.getElementById('f-col-car').value, fCli = document.getElementById('f-cli-car').value.toLowerCase();
            cl.innerHTML = '';
            dbC.filter(c => (fs==='TODAS'||c.Sucursal===fs) && (fv==='TODOS'||c.Vendedor===fv)).forEach(c => {
                const d = parseInt(c.Dias)||0;
                const match = (fCol==='TODOS'||(fCol==='VERDE'&&d<=14)||(fCol==='AMBAR'&&d>14&&d<=60)||(fCol==='ROJO'&&d>60));
                if(match) {
                    if(!ranking[c.Vendedor]) ranking[c.Vendedor] = 0; ranking[c.Vendedor]++;
                    if(c.Cliente.toLowerCase().includes(fCli)) {
                        cl.innerHTML += `<div class="client-item"><div class="semaforo-mini"><div class="dot-light verde ${d<=14?'active':''}"></div><div class="dot-light ambar ${d>14&&d<=60?'active':''}"></div><div class="dot-light rojo ${d>60?'active':''}"></div></div><div style="flex:1"><b>${c.Cliente}</b><br><small>${c.Vendedor} (${d}d)</small></div><b>$${Math.floor(parseFloat(c.Venta_Mes)||0).toLocaleString()}</b></div>`;
                    }
                }
            });

            // RANKING
            const rl = document.getElementById('rank-list'); rl.innerHTML = '';
            Object.entries(ranking).sort((a,b)=>b[1]-a[1]).slice(0,10).forEach(([n,c],i) => {
                rl.innerHTML += `<div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #222;"><span>${i+1}. ${n}</span><b style="color:var(--green)">${c} Clientes</b></div>`;
            });
        }

        function checkInventory(q) {
            const box = document.getElementById('inv-res');
            let list = q ? dbP.filter(p => (p.Parte||'').toUpperCase().includes(q.toUpperCase()) || (p.Marca||'').toUpperCase().includes(q.toUpperCase())) : dbP.filter(p => parseInt(p.Existencia) <= 3);
            box.innerHTML = q ? '' : '<div style="font-size:0.6rem; color:var(--gold); text-align:center; margin-bottom:5px;">STOCK BAJO/CRÍTICO</div>';
            list.slice(0,20).forEach(p => {
                const qty = parseInt(p.Existencia)||0;
                box.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #222; font-size:0.75rem;"><div><b>${p.Parte}</b><br><small>${p.Marca}</small></div><b style="color:${qty<=0?'var(--red)':'var(--green)'}">${qty} pz</b></div>`;
            });
        }

        function calcTopProducts() {
            const list = document.getElementById('top-prod-list'); 
            let counts = {};
            dbD.forEach(v => { const p = (v.Parte||v.SKU||"").toString().trim().toUpperCase(); if(p && p !== "PARTE") counts[p] = (counts[p]||0) + parseInt(v.Cantidad||1); });
            const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,10);
            list.innerHTML = '';
            sorted.forEach(([sku, qty], i) => {
                const sInfo = dbP.find(p => (p.Parte||"").toString().trim().toUpperCase() === sku);
                const sQty = sInfo ? parseInt(sInfo.Existencia) : 0;
                const sMarca = sInfo ? sInfo.Marca : "FLEETRITE";
                list.innerHTML += `<div class="prod-row"><div class="prod-rank">${i+1}</div><div class="prod-info"><b>${sku}</b><small>${sMarca}</small></div><div class="prod-stat"><b>${qty} vend.</b><small style="color:${sQty<=5?'var(--red)':'var(--green)'}">${sQty} stock</small></div></div>`;
            });
        }

        function exportCartera() { let csv = "Cliente,Vendedor,Sucursal,Dias\n"; dbC.forEach(c => csv += `"${c.Cliente}","${c.Vendedor}","${c.Sucursal}","${c.Dias}"\n`); const blob = new Blob([csv], {type:'text/csv'}); const link = document.createElement("a"); link.href=URL.createObjectURL(blob); link.download="Cartera_Catosa.csv"; link.click(); }
        function exportBitacora() { let csv = "Vendedor,Cliente,Atendio,Motivo,Resultado,Notas\n"; dbS.forEach(s => csv += `"${s.Vendedor}","${s.Cliente}","${s.Atendio}","${s.Motivo}","${s.Resultado}","${s.Notas}"\n`); const blob = new Blob([csv], {type:'text/csv'}); const link = document.createElement("a"); link.href=URL.createObjectURL(blob); link.download="Bitacora_Catosa.csv"; link.click(); }
    </script>
</body>
</html>
