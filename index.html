<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catosa Performance GP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --color-primario: #d21034; 
            --color-fondo: #32373c;   /* GRIS RATA */
            --color-card: #282c30;    /* GRIS OSCURO */
            --verde: #2ecc71;
            --amarillo: #f1c40f;
            --rojo: #e74c3c;
            --texto: #f5f5f5;
            --pista: #1e2124;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--color-fondo); color: var(--texto); margin: 0; padding: 10px; transition: 0.5s; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid rgba(255,255,255,0.1); padding: 10px; margin-bottom: 10px; }
        .logo { max-height: 35px; width: auto; }
        h1 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; flex: 1; text-align: center; margin: 0; }

        #status { text-align: center; font-size: 0.65rem; padding: 8px; margin-bottom: 15px; border-radius: 4px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color: var(--verde); font-weight: bold; }

        .track { max-width: 1000px; margin: 0 auto 20px; background: var(--pista); border: 1px solid #444; position: relative; padding: 15px 0; border-radius: 8px; box-shadow: inset 0 0 20px #000; }
        .finish-line { position: absolute; right: 0; top: 0; bottom: 0; width: 15px; background: repeating-linear-gradient(45deg, #333, #333 5px, #111 5px, #111 10px); opacity: 0.5; }
        .lane { height: 50px; position: relative; border-bottom: 1px solid #333; display: flex; align-items: flex-end; }
        .truck { position: absolute; bottom: 8px; left: 0; width: 70px; height: 25px; background: var(--color-primario); border-radius: 3px; transition: all 2s cubic-bezier(0.1, 0.7, 0.1, 1); display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .truck-label { position: absolute; left: 10px; top: 5px; font-size: 10px; color: #aaa; font-weight: bold; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; max-width: 1100px; margin: 0 auto; }
        .card { background: var(--color-card); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .card h2 { color: var(--color-primario); font-size: 0.7rem; text-transform: uppercase; margin: 0 0 15px 0; letter-spacing: 1px; }

        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #444; background: #1e2124; color: #fff; box-sizing: border-box; font-size: 16px; }
        input:focus { outline: none; border-color: var(--color-primario); background: #282c30; }
        
        .big-res { font-size: 2.5rem; color: var(--verde); text-align: center; font-weight: bold; margin: 10px 0; }
        
        .c-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 10px; }

        .quote-box { background: #1e2124; padding: 15px; border-radius: 8px; border: 1px solid #444; margin-top: 10px; }
        .btn-ws { width: 100%; padding: 15px; background: #25d366; color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.2); }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo-catosa.png" class="logo" alt="Catosa">
        <h1>Catosa GP</h1>
        <img src="logo-international.png" class="logo" alt="Intl">
    </div>

    <div id="status">● ACTUALIZANDO DATOS...</div>

    <div class="track">
        <div class="finish-line"></div>
        <div id="pista"></div>
    </div>

    <div class="grid">
        <div class="card">
            <h2>💰 Comisiones</h2>
            <input type="number" id="vMonto" placeholder="Venta Total ($)" oninput="calc()">
            <div class="big-res" id="resCom">$0.00</div>
        </div>

        <div class="card">
            <h2>📋 Cotizador</h2>
            <input type="text" id="cCliente" placeholder="Cliente...">
            <input type="text" id="cParte" placeholder="N° de Parte..." oninput="cotizar()">
            <div class="quote-box">
                <div id="qDesc" style="color:#888; font-size:0.75rem;">Esperando N° de parte...</div>
                <div id="qTotal" style="font-size:1.5rem; color:var(--verde); font-weight:bold; margin-top:5px;">$0.00</div>
            </div>
            <button class="btn-ws" onclick="enviar()">📲 WhatsApp</button>
        </div>

        <div class="card">
            <h2>👥 Cartera</h2>
            <div id="lista"></div>
        </div>
    </div>

    <script>
        const DOC_ID = "1xTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH";
        const URL_VEND = `https://docs.google.com/spreadsheets/d/e/2PACX-${DOC_ID}/pub?gid=0&single=true&output=csv&t=${new Date().getTime()}`;
        const URL_PROD = `https://docs.google.com/spreadsheets/d/e/2PACX-${DOC_ID}/pub?gid=1610979668&single=true&output=csv&t=${new Date().getTime()}`;

        let dbV = [], dbP = [], currentItem = null;

        const findVal = (obj, key) => {
            const k = Object.keys(obj).find(x => x.trim().toLowerCase() === key.toLowerCase());
            return k ? obj[k] : null;
        };

        async function init() {
            Papa.parse(URL_VEND, { download: true, header: true, complete: (r) => { dbV = r.data; renderV(); check(); } });
            Papa.parse(URL_PROD, { download: true, header: true, complete: (r) => { dbP = r.data; check(); } });
        }

        function check() {
            if(dbV.length > 0 && dbP.length > 0) {
                document.getElementById('status').innerText = "● CONECTADO";
                document.getElementById('status').style.color = "var(--verde)";
            }
        }

        function renderV() {
            const p = document.getElementById('pista'), l = document.getElementById('lista');
            p.innerHTML = ''; l.innerHTML = '';
            dbV.forEach(f => {
                const n = findVal(f, 'Nombre'), v = findVal(f, 'Ventas'), m = findVal(f, 'Meta');
                if(n && v) {
                    const pct = Math.min(100, (parseFloat(ven = v)/parseFloat(met = m))*100);
                    p.innerHTML += `<div class="lane"><div class="truck-label">${n}</div><div class="truck" style="left:calc(${pct}% - 75px)">INTL</div></div>`;
                }
                const cli = findVal(f, 'Cliente'), d = findVal(f, 'DiasSinComprar');
                if(cli) {
                    let c = d <= 14 ? 'verde' : (d <= 60 ? 'amarillo' : 'rojo');
                    l.innerHTML += `<div class="c-item"><span><span class="dot" style="background:var(--${c})"></span>${cli}</span><small>${d}d</small></div>`;
                }
            });
        }

        function cotizar() {
            const part = document.getElementById('cParte').value.trim().toUpperCase();
            const cli = document.getElementById('cCliente').value.trim().toUpperCase();
            currentItem = dbP.find(x => {
                const xPart = (findVal(x, 'Parte') || "").toString().toUpperCase();
                const xCli = (findVal(x, 'Cliente_Especial') || "").toString().toUpperCase();
                return xPart === part && (xCli === cli || xCli === "");
            });
            if(currentItem) {
                const pre = parseFloat(findVal(currentItem, 'Precio')) || 0;
                document.getElementById('qDesc').innerText = findVal(currentItem, 'Descripcion') || findVal(currentItem, 'Parte');
                document.getElementById('qTotal').innerText = "$" + pre.toLocaleString();
            } else {
                document.getElementById('qDesc').innerText = "No encontrado";
                document.getElementById('qTotal').innerText = "$0.00";
            }
        }

        function enviar() {
            if(!currentItem) return;
            const t = document.getElementById('qTotal').innerText;
            window.open(`https://wa.me/?text=${encodeURIComponent("*CATOSA - Cotización*\nRef: " + document.getElementById('qDesc').innerText + "\nTotal: " + t)}`, '_blank');
        }

        function calc() {
            const m = document.getElementById('vMonto').value;
            const res = (m * 0.25) * 0.03;
            document.getElementById('resCom').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits:2});
        }

        window.onload = init;
    </script>
</body>
</html>
