<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catosa GP - Asesores</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --red: #d21034; --bg: #111315; --card: #1a1d20; --green: #00ff88; --blue: #00d4ff; --text: #f5f5f5; --asfalto: #0c0e10; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 40px; border-radius: 15px; border-top: 5px solid var(--red); text-align: center; width: 85%; max-width: 350px; }
        .login-logo { max-height: 50px; margin-bottom: 25px; display: block; margin-left: auto; margin-right: auto; }
        
        #main-app { display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 2px solid #444; margin-bottom: 15px; }
        .logo { max-height: 25px; }

        .kpi-card { background: var(--card); padding: 20px; border-radius: 12px; border-top: 3px solid var(--blue); text-align: center; margin-bottom: 15px; }
        .kpi-val { font-size: 1.6rem; font-weight: bold; color: var(--green); margin: 5px 0; }

        .race-track { background: var(--asfalto); border-radius: 15px; padding: 20px 0; border: 2px solid #333; position: relative; overflow: hidden; margin-bottom: 15px; box-shadow: inset 0 0 30px #000; min-height: 80px; }
        .truck { position: absolute; bottom: 10px; left: 0; width: 90px; height: 45px; background-image: url('camion-intl.png'); background-size: contain; background-repeat: no-repeat; transition: 3s; filter: drop-shadow(0 0 8px var(--green)); }

        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #333; margin-bottom: 15px; }
        h2 { font-size: 0.7rem; color: var(--blue); border-bottom: 1px solid #333; padding-bottom: 10px; text-transform: uppercase; margin-top: 0; }

        .cot-row { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-bottom: 10px; }
        .btn-action { display: flex; gap: 10px; margin-top: 15px; }
        .btn-wa { background: #25d366 !important; }
        .btn-mail { background: #0078d4 !important; }

        .client-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #222; }
        .t-light { display: flex; flex-direction: column; gap: 3px; background: #000; padding: 6px; border-radius: 15px; width: 16px; border: 1px solid #333; margin-right: 15px; }
        .light { width: 100%; height: 10px; border-radius: 50%; opacity: 0.1; }
        .light.on { opacity: 1; box-shadow: 0 0 10px currentColor; }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 10px; }
        .day-box { background: #000; border: 1px solid #333; border-radius: 6px; padding: 8px 2px; text-align: center; }
        .day-num { font-size: 0.6rem; color: #555; display: block; }
        .day-in { width: 100%; background: transparent; border: none; color: var(--green); font-size: 0.7rem; font-weight: bold; text-align: center; outline: none; }

        input, textarea { width: 100%; background: #000; border: 1px solid #333; padding: 12px; border-radius: 8px; color: #fff; margin-bottom: 10px; box-sizing: border-box; font-size: 0.8rem; }
        .btn { padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: #fff; width: 100%; background: var(--red); text-transform: uppercase; font-size: 0.75rem; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <img src="logo-catosa.png" class="login-logo" onerror="this.style.display='none'">
            <h2 style="font-size: 0.9rem; color: #fff; margin-bottom: 25px; letter-spacing: 2px;">ASESORES CATOSA</h2>
            <input type="text" id="user-name" placeholder="Escribe tu Nombre" style="text-align: center;">
            <input type="password" id="user-pass" placeholder="Password (Apellido123)" style="text-align: center;">
            <button class="btn" onclick="login()">ENTRAR A MI PISTA</button>
            <p id="error" style="color:var(--red); font-size:0.6rem; margin-top:15px; display:none;">No te encontramos. Revisa tu nombre o clave.</p>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <img src="logo-catosa.png" class="logo">
            <h1 style="font-size: 0.6rem;"><span id="u-display">--</span> | <span id="s-display">--</span></h1>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--red); cursor:pointer; font-weight:bold;">SALIR</button>
        </div>

        <div class="race-track"><div id="mi-camion" class="truck"></div></div>

        <div class="kpi-card">
            <div style="font-size:0.6rem; color:#888; text-transform: uppercase;">Mi Venta Real</div>
            <div class="kpi-val" id="k-v">$0</div>
            <div id="k-p" style="font-size:0.75rem; color:var(--blue); font-weight:bold;">0% Alcance</div>
        </div>

        <div class="card">
            <h2>📑 COTIZADOR EXPRESS</h2>
            <input type="text" id="cot-cliente" placeholder="Nombre del Cliente">
            <div class="cot-row">
                <input type="text" id="cot-parte" placeholder="N° de Parte">
                <input type="number" id="cot-piezas" placeholder="Pzs">
            </div>
            <textarea id="cot-obs" placeholder="Observaciones (Opcional)"></textarea>
            <div class="btn-action">
                <button class="btn btn-wa" onclick="sendWA()">WhatsApp</button>
                <button class="btn btn-mail" onclick="sendMail()">Correo</button>
            </div>
        </div>

        <div class="card">
            <h2>📅 CALCULADORA DIARIA</h2>
            <div class="cal-grid" id="cal-grid"></div>
            <div style="text-align:center;">
                <div id="c-sum" style="font-size:1.2rem; font-weight:bold; color:var(--green)">$0</div>
            </div>
        </div>

        <div class="card">
            <h2>👥 MI CARTERA DE CLIENTES</h2>
            <input type="text" id="f-cli" placeholder="🔍 Buscar cliente en mi lista..." oninput="renderApp()">
            <div id="lista-cli"></div>
        </div>
    </div>

    <script>
        const URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?output=csv&t=${new Date().getTime()}`;
        
        let dbTotal = [], user = null;

        function getV(obj, keyName) {
            if (!obj) return "";
            const keys = Object.keys(obj);
            const foundKey = keys.find(k => k.trim().toLowerCase().includes(keyName.toLowerCase()));
            return foundKey ? obj[foundKey] : "";
        }

        window.onload = () => {
            const cg = document.getElementById('cal-grid');
            for(let i=1; i<=31; i++) cg.innerHTML += `<div class="day-box"><span class="day-num">${i}</span><input type="number" class="day-in" oninput="sumCal()"></div>`;
            Papa.parse(URL, { download: true, header: true, complete: (r) => { dbTotal = r.data; } });
        };

        function login() {
            const ni = document.getElementById('user-name').value.trim().toUpperCase();
            const pi = document.getElementById('user-pass').value.trim().toUpperCase();
            
            // BUSCADOR FLEXIBLE
            const found = dbTotal.find(v => {
                const nombreCompleto = getV(v, 'Nombre').trim().toUpperCase();
                if(!nombreCompleto) return false;
                
                const partes = nombreCompleto.split(" ").filter(x => x);
                const apellido = partes[partes.length - 1]; // Toma el último apellido
                
                const claveCorrecta = (apellido + "123").toUpperCase();
                
                // Entra si el nombre coincide Y la clave es correcta
                return nombreCompleto.includes(ni) && (claveCorrecta === pi);
            });

            if(found) {
                user = found;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('u-display').innerText = getV(user, 'Nombre');
                document.getElementById('s-display').innerText = getV(user, 'Sucursal');
                renderApp();
            } else { document.getElementById('error').style.display = 'block'; }
        }

        function renderApp() {
            const vr = parseFloat(getV(user, 'Ventas').toString().replace(/[^0-9.]/g, '')) || 0;
            const vm = parseFloat(getV(user, 'Meta').toString().replace(/[^0-9.]/g, '')) || 1;
            const pct = Math.min(100, (vr/vm)*100);

            document.getElementById('k-v').innerText = "$" + vr.toLocaleString();
            document.getElementById('k-p').innerText = pct.toFixed(1) + "% Alcance";
            document.getElementById('mi-camion').style.left = `calc(${pct}% - 90px)`;

            const lc = document.getElementById('lista-cli'), fc = document.getElementById('f-cli').value.toLowerCase();
            lc.innerHTML = '';
            
            // BUSCAR CLIENTES POR NOMBRE DE VENDEDOR
            dbTotal.forEach(c => {
                const vendedorFila = getV(c, 'Vendedor').trim().toUpperCase();
                const miNombre = getV(user, 'Nombre').trim().toUpperCase();
                const clienteNombre = getV(c, 'Cliente');
                
                if(vendedorFila === miNombre && clienteNombre.toLowerCase().includes(fc)) {
                    const d = parseInt(getV(c, 'Dias')) || 0;
                    lc.innerHTML += `
                        <div class="client-row">
                            <div class="t-light">
                                <div class="light ${d<=14?'on':''}" style="color:#0f0; background:#0f0;"></div>
                                <div class="light ${d>14&&d<=60?'on':''}" style="color:#ff0; background:#ff0;"></div>
                                <div class="light ${d>60?'on':''}" style="color:#f00; background:#f00;"></div>
                            </div>
                            <div style="flex:1;">
                                <b style="font-size:13px;">${clienteNombre}</b><br>
                                <small style="color:#777;">Última: ${getV(c, 'Fecha')}</small>
                            </div>
                            <b style="color:var(--red); padding-right:10px;">${d}d</b>
                        </div>`;
                }
            });
        }

        function sumCal() {
            let s = 0; document.querySelectorAll('.day-in').forEach(i => s += parseFloat(i.value) || 0);
            document.getElementById('c-sum').innerText = "$" + s.toLocaleString();
        }

        function getCotText() {
            const cli = document.getElementById('cot-cliente').value;
            const par = document.getElementById('cot-parte').value;
            const pzs = document.getElementById('cot-piezas').value;
            const obs = document.getElementById('cot-obs').value;
            return `*CATOSA - COTIZACIÓN EXPRESS*%0A%0A*Cliente:* ${cli}%0A*Parte:* ${par}%0A*Cantidad:* ${pzs} pzs%0A*Atiende:* ${getV(user, 'Nombre')}%0A${obs ? '*Obs:* ' + obs : ''}`;
        }

        function sendWA() { window.open(`https://api.whatsapp.com/send?text=${getCotText()}`); }
        function sendMail() {
            const body = getCotText().replace(/\*/g, '').replace(/%0A/g, '%0D%0A');
            window.location.href = `mailto:?subject=Cotizacion Catosa - ${document.getElementById('cot-cliente').value}&body=${body}`;
        }
    </script>
</body>
</html>
