<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catosa GP - Ventas Elite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --red: #d21034; --bg: #0c0e10; --card: #1a1d20; --green: #00ff88; --blue: #00d4ff; --text: #f5f5f5; --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; border-top: 5px solid var(--red); text-align: center; width: 280px; }
        #main-app { display: none; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 2px solid #333; margin-bottom: 15px; }

        .time-panel { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        .time-item { text-align: center; flex: 1; }
        .time-label { font-size: 0.55rem; color: #888; display: block; text-transform: uppercase; margin-bottom: 2px; }
        .time-value { font-size: 0.9rem; font-weight: bold; display: block; }

        .top-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .top-card { background: var(--card); padding: 10px 2px; border-radius: 8px; text-align: center; border-bottom: 2px solid var(--blue); }
        .top-card span { font-size: 0.5rem; color: #888; display: block; text-transform: uppercase; }
        .top-card b { font-size: 0.8rem; color: var(--green); }
        @keyframes blink { 0% { background: var(--card); } 50% { background: #4a0000; } 100% { background: var(--card); } }
        .alert-blink { animation: blink 1s infinite; border-top: 3px solid var(--red) !important; }

        .race-track { background: #050505; border-radius: 15px; padding: 25px 0; border: 1px solid #333; position: relative; overflow: hidden; margin-bottom: 15px; height: 80px; }
        .line-meta { position: absolute; top: 0; bottom: 0; width: 1px; opacity: 0.4; z-index: 1; }
        .l-85 { left: 73.9%; border-left: 1px dashed var(--bronze); }
        .l-100 { left: 86.9%; border-left: 2px dashed white; }
        .l-115 { right: 0; width: 15px; background: repeating-linear-gradient(45deg, #fff, #fff 5px, #000 5px, #000 10px); opacity: 0.2; border-left: 2px solid var(--gold); }
        
        .truck { position: absolute; bottom: 20px; width: 85px; height: 45px; background-image: url('camion-intl.png'); background-size: contain; background-repeat: no-repeat; transition: 3s cubic-bezier(0.2, 0, 0.2, 1); z-index: 10; }
        .truck.bronce { filter: drop-shadow(0 0 10px var(--bronze)); }
        .truck.plata { filter: drop-shadow(0 0 15px var(--silver)); }
        .truck.oro { filter: drop-shadow(0 0 25px var(--gold)); animation: turbo 1s infinite alternate; }

        .btn-reporte { background: var(--blue); margin-bottom: 15px; box-shadow: 0 0 10px rgba(0, 212, 255, 0.4); border-radius: 8px; border:none; padding: 14px; font-weight: bold; cursor: pointer; color: #fff; text-transform: uppercase; width: 100%; font-size: 0.85rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #333; margin-bottom: 15px; }

        .progress-bg { width: 100%; height: 18px; background: #000; border-radius: 10px; border: 1px solid #444; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--red); transition: 1.5s; box-shadow: 0 0 10px var(--red); }
        .cal-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; max-height: 350px; overflow-y: auto; padding-right: 5px; }
        .day-box { background: #000; border: 1px solid #333; border-radius: 8px; padding: 8px; text-align: center; }
        .day-in { width: 100%; background: transparent; border: none; color: var(--green); font-size: 1rem; text-align: center; outline: none; font-weight: bold; padding: 5px 0; }
        .day-label { font-size: 0.6rem; color: #888; display: block; margin-bottom: 4px; border-bottom: 1px solid #222; }

        .cot-list { width: 100%; border-collapse: collapse; font-size: 0.75rem; color: #ccc; margin: 10px 0; }
        .cot-list th { text-align: left; color: var(--blue); border-bottom: 1px solid #333; padding: 8px 4px; }
        .cot-footer { background: rgba(0,212,255,0.08); font-weight: 900; color: #fff; border-top: 2px solid var(--blue); }

        .prod-row { display: flex; align-items: center; background: rgba(255,255,255,0.02); margin-bottom: 8px; padding: 12px; border-radius: 10px; position: relative; }
        .prod-rank-icon { color: var(--gold); font-size: 1.2rem; font-weight: bold; margin-right: 15px; width: 25px; border-left: 3px solid var(--gold); border-radius: 0 5px 5px 0; padding-left: 10px; }
        .prod-info-main { flex: 1; }
        .prod-stat-data { text-align: right; }

        input, select { width: 100%; background: #000; border: 1px solid #333; padding: 12px; border-radius: 8px; color: #fff; margin-bottom: 10px; box-sizing: border-box; font-size: 16px !important; }
        .btn { padding: 14px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: #fff; background: var(--red); text-transform: uppercase; width: 100%; }

        .client-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #222; justify-content: space-between; font-size: 0.8rem; }
        .semaforo { display: flex; flex-direction: column; gap: 3px; margin-right: 15px; width: 10px; }
        .light { width: 10px; height: 10px; border-radius: 50%; background: #222; }
        .light.on.verde { background: #0f0; box-shadow: 0 0 8px #0f0; }
        .light.on.ambar { background: #ff0; box-shadow: 0 0 8px #ff0; }
        .light.on.rojo { background: #f00; box-shadow: 0 0 8px #f00; }
        
        .stock-highlight { border: 1px solid var(--blue); background: rgba(0, 212, 255, 0.05); padding: 10px; border-radius: 8px; margin-bottom: 10px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { border-color: var(--blue); } 50% { border-color: transparent; } 100% { border-color: var(--blue); } }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <img src="logo-catosa.png" style="max-height: 40px; margin-bottom: 20px;">
            <input type="text" id="u-name" placeholder="NOMBRE">
            <input type="password" id="u-pass" placeholder="PASSWORD">
            <button class="btn" onclick="login()">ENTRAR AL GP</button>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <img src="logo-catosa.png" style="max-height: 20px;">
            <div style="text-align: center;"><b id="u-disp" style="font-size: 0.7rem; display: block;">--</b><small id="s-disp" style="color: var(--blue); font-size: 0.6rem;">--</small></div>
            <button style="background:none; border:1px solid var(--red); color:var(--red); padding:5px 10px; border-radius:5px; cursor:pointer; font-size:0.6rem;" onclick="location.reload()">SALIR</button>
        </div>

        <div class="time-panel">
            <div class="time-item"><span class="time-label">Hoy</span><span class="time-value" id="val-hoy">--</span></div>
            <div class="time-item" style="border-left: 1px solid #333; border-right: 1px solid #333;"><span class="time-label">Cierre en</span><span class="time-value" id="val-dias" style="color: var(--red);">--</span></div>
            <div class="time-item"><span class="time-label">Falta Oro</span><span class="time-value" id="val-falta-oro" style="color: var(--gold);">$0</span></div>
        </div>

        <div class="top-stats">
            <div class="top-card"><span>Mi Venta</span><b id="k-v">$0</b></div>
            <div class="top-card" id="card-falta"><span>Falta Plata</span><b id="k-f" style="color:var(--text)">$0</b></div>
            <div class="top-card"><span>Alcance P.</span><b id="k-pp">0%</b></div>
            <div class="top-card"><span>Alcance O.</span><b id="k-po">0%</b></div>
        </div>

        <div class="race-track">
            <div class="line-meta l-85"></div><div class="line-meta l-100"></div><div class="line-meta l-115"></div>
            <div id="mi-camion" class="truck"></div>
        </div>

        <button class="btn-reporte" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSd8lCHVlqTobNSlLxKr7b9y_kkxH9XFPPMhkAKa_eW5IaPueQ/viewform','_blank')">📝 REGISTRAR GESTIÓN / VISITA</button>

        <div class="grid">
            <div class="card">
                <h2>📑 Cotizadora Express</h2>
                <input list="cli-cot" id="cot-cli-name" placeholder="Nombre del Cliente">
                <datalist id="cli-cot"></datalist>
                <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 5px; margin-bottom: 10px;">
                    <input type="text" id="p-sku" placeholder="Parte" oninput="handleSkuInput(this)">
                    <input type="number" id="p-qty" placeholder="Cant" value="1">
                    <input type="number" id="p-prc" placeholder="Precio" readonly>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button class="btn" style="background:#444;" onclick="addCot()">AÑADIR</button>
                    <button class="btn" style="background:#222;" onclick="clearCot()">LIMPIAR</button>
                </div>
                <table class="cot-list">
                    <thead><tr><th>SKU</th><th>Cant</th><th>P. Unit</th></tr></thead>
                    <tbody id="cot-body"></tbody>
                    <tfoot>
                        <tr class="cot-footer">
                            <td>TOTAL</td>
                            <td id="total-pzs">0 pzs</td>
                            <td id="total-monto">$0</td>
                        </tr>
                    </tfoot>
                </table>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                    <button class="btn" style="background:#25d366" onclick="sendQuote('wa')">WhatsApp</button>
                    <button class="btn" style="background:#0078d4" onclick="sendQuote('mail')">Correo</button>
                </div>
            </div>

            <div class="card" id="stock-card">
                <h2>📦 Consulta de Stock</h2>
                <input type="text" id="stock-search-input" placeholder="Consultar SKU o Marca..." oninput="checkInventory(this.value)">
                <div id="inv-res" style="max-height: 200px; overflow-y: auto;"></div>
            </div>

            <div class="card">
                <h2>🔥 Mis Productos Top 5</h2>
                <div id="v-top-list"></div>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2>💰 Proyección Comisión</h2>
                    <button onclick="clearProyeccion()" style="background:none; border:1px solid #444; color:#666; font-size:0.5rem; border-radius:3px; padding:2px 5px; cursor:pointer;">LIMPIAR</button>
                </div>
                <div style="margin: 10px 0;"><label style="font-size:0.6rem; color:#888;">% COMISIÓN:</label><input type="number" id="c-pct" value="1.5" step="0.1" oninput="sumCal()"></div>
                <div class="progress-bg"><div id="obj-fill" class="progress-fill"></div></div>
                <div style="display:flex; justify-content:space-between; font-size:1rem; font-weight:bold; margin-bottom:15px;"><span id="r-v" style="color:var(--green)">$0</span><span id="r-c" style="color:var(--blue)">$0</span><b id="metal" style="font-size:0.7rem; padding:4px 12px; border-radius:4px; background:#333;">S/N</b></div>
                <div class="cal-grid" id="cal-grid"></div>
            </div>

            <div class="card">
                <h2>👥 Mi Cartera</h2>
                <select id="f-color" onchange="renderApp()"><option value="TODOS">TODOS LOS COLORES</option><option value="VERDE">VERDE</option><option value="AMBAR">AMBAR</option><option value="ROJO">ROJO</option></select>
                <div id="lista-cli" style="max-height: 400px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <script>
        const L = {
            v: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=0&single=true&output=csv",
            c: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1068966462&single=true&output=csv",
            p: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1610979668&single=true&output=csv",
            det: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1262272182&single=true&output=csv"
        };
        let dbV=[], dbC=[], dbP=[], dbD=[], user=null, cotList=[], cnf=false;

        window.onload = () => {
            const cg = document.getElementById('cal-grid');
            for(let i=1; i<=31; i++) {
                const saved = localStorage.getItem('day_' + i) || '';
                cg.innerHTML += `<div class="day-box"><span class="day-label">${i}</span><input type="number" class="day-in" id="in_day_${i}" value="${saved}" placeholder="0" oninput="saveAndSum(${i})"></div>`;
            }
            Papa.parse(L.v, { download:true, header:true, complete: r => dbV=r.data });
            Papa.parse(L.c, { download:true, header:true, complete: r => { dbC=r.data; fillClie(); } });
            Papa.parse(L.p, { download:true, header:true, complete: r => { dbP=r.data; checkInventory(""); } });
            Papa.parse(L.det, { download:true, header:true, complete: r => dbD=r.data });
        };

        function handleSkuInput(input) {
            quickSearch(input);
            const val = input.value.trim().toUpperCase();
            if(val.length > 2) {
                document.getElementById('stock-search-input').value = val;
                checkInventory(val);
                document.getElementById('stock-card').classList.add('stock-highlight');
                setTimeout(() => document.getElementById('stock-card').classList.remove('stock-highlight'), 1500);
            }
        }

        function saveAndSum(day) { localStorage.setItem('day_' + day, document.getElementById('in_day_' + day).value); sumCal(); }
        function clearProyeccion() { if(confirm("¿Limpiar calculadora?")) { for(let i=1; i<=31; i++) { document.getElementById('in_day_'+i).value=''; localStorage.removeItem('day_'+i); } sumCal(); } }

        function login() {
            const n = document.getElementById('u-name').value.trim().toUpperCase();
            const p = document.getElementById('u-pass').value.trim().toUpperCase();
            const f = dbV.find(v => {
                const sN = (v.Nombre || "").toUpperCase();
                const ape = sN.split(" ").pop();
                return (sN.includes(n) && n !== "") && (p === ape + "123" || p === 'CATOSA2026');
            });
            if(f){ user=f; document.getElementById('login-screen').style.display='none'; document.getElementById('main-app').style.display='block'; 
                document.getElementById('u-disp').innerText=user.Nombre; document.getElementById('s-disp').innerText=user.Sucursal; 
                renderApp(); calcMyTop(); sumCal(); } else alert("Acceso denegado");
        }

        function renderApp() {
            if(!user) return;
            const vr = parseFloat(user.Ventas.replace(/[^0-9.]/g,''))||0, vm = parseFloat(user.Meta.replace(/[^0-9.]/g,''))||1;
            const pct = (vr/vm)*100;
            const hoy = new Date(), uDia = new Date(hoy.getFullYear(), hoy.getMonth() + 1, 0).getDate(), dR = (uDia - hoy.getDate()) + 1;
            document.getElementById('val-hoy').innerText = hoy.toLocaleDateString('es-MX', {day:'numeric', month:'short'}).toUpperCase();
            document.getElementById('val-dias').innerText = dR + (dR === 1 ? " Día" : " Días");
            document.getElementById('val-falta-oro').innerText = "$" + Math.max(0, Math.floor(vm*1.15 - vr)).toLocaleString();
            if(dR <= 5) document.getElementById('card-falta').classList.add('alert-blink');

            document.getElementById('k-v').innerText="$"+Math.floor(vr).toLocaleString();
            document.getElementById('k-f').innerText="$"+Math.max(0, Math.floor(vm - vr)).toLocaleString();
            document.getElementById('k-pp').innerText=((vr/vm)*100).toFixed(1) + "%";
            document.getElementById('k-po').innerText=((vr/(vm*1.15))*100).toFixed(1) + "%";
            
            const t = document.getElementById('mi-camion'); t.style.left=`calc(${Math.min(100,(pct/115)*100)}% - 85px)`;
            t.classList.remove('bronce','plata','oro');
            if(pct>=115){ t.classList.add('oro'); if(!cnf){confetti({particleCount:150});cnf=true;}}
            else if(pct>=100) t.classList.add('plata'); else if(pct>=85) t.classList.add('bronce');

            const lc = document.getElementById('lista-cli'), fCol = document.getElementById('f-color').value;
            lc.innerHTML='';
            dbC.filter(c => (c.Vendedor||"").toUpperCase().includes(user.Nombre.split(" ")[0].toUpperCase())).forEach(c => {
                const d = parseInt(c.Dias)||0;
                const match = (fCol==='TODOS'||(fCol==='VERDE'&&d<=14)||(fCol==='AMBAR'&&d>14&&d<=60)||(fCol==='ROJO'&&d>60));
                if(match) {
                    lc.innerHTML += `<div class="client-item">
                        <div style="display:flex; align-items:center;"><div class="semaforo"><div class="light on ${d<=14?'verde':(d<=60?'ambar':'rojo')}"></div></div>
                        <div><b>${c.Cliente}</b><br><small>${d}d inactivo</small></div></div><b style="color:var(--green)">$${Math.floor(parseFloat(c.Venta_Mes)||0).toLocaleString()}</b></div>`;
                }
            });
        }

        function sumCal() {
            let s=0; document.querySelectorAll('.day-in').forEach(i=>s+=parseFloat(i.value)||0);
            const vm=user?parseFloat(user.Meta.replace(/[^0-9.]/g,'')):1, pct=(s/(vm||1))*100, fill=document.getElementById('obj-fill');
            if(fill) fill.style.width = Math.min(100, (pct/115)*100) + "%";
            document.getElementById('r-v').innerText="$"+Math.floor(s).toLocaleString();
            document.getElementById('r-c').innerText="$"+Math.floor(s*(document.getElementById('c-pct').value/100)).toLocaleString();
            const b = document.getElementById('metal'); b.innerText = pct>=115?'ORO':(pct>=100?'PLATA':(pct>=85?'BRONCE':'S/N'));
            b.style.background = pct>=115?'var(--gold)':(pct>=100?'var(--silver)':(pct>=85?'var(--bronze)':'#333'));
            b.style.color = pct>=85?'#000':'#fff';
        }

        function addCot() { 
            const s=document.getElementById('p-sku').value.toUpperCase(), q=parseInt(document.getElementById('p-qty').value), p=parseFloat(document.getElementById('p-prc').value); 
            if(!s || !q || isNaN(p)) return; 
            cotList.push({s, q, p, t: q*p}); renderCot(); 
        }

        function clearCot() { cotList = []; renderCot(); }

        function renderCot() { 
            const b = document.getElementById('cot-body'); b.innerHTML = ''; 
            let tPzs = 0, tMonto = 0;
            cotList.forEach(i => {
                b.innerHTML += `<tr><td>${i.s}</td><td>${i.q}</td><td>$${i.p.toLocaleString()}</td></tr>`;
                tPzs += i.q; tMonto += i.t;
            });
            document.getElementById('total-pzs').innerText = tPzs + " pzs";
            document.getElementById('total-monto').innerText = "$" + tMonto.toLocaleString();
        }

        function sendQuote(m) {
            const cli = document.getElementById('cot-cli-name').value || "Cliente";
            if(cotList.length === 0) return alert("Añade productos");
            let total = 0, pzs = 0; 
            cotList.forEach(i => { total += i.t; pzs += i.q; });
            let t = `*COTIZACIÓN CATOSA GP*\n------------------------------------------\n*Buen día, ${cli}*\nLe atiende: *${user.Nombre}*\n\nLe envío la relación de productos solicitada:\n\n`;
            cotList.forEach(i => t += `• ${i.s} | Cant: ${i.q} | Unit: $${i.p.toLocaleString()} | Subtotal: $${i.t.toLocaleString()}\n`);
            t += `\n------------------------------------------\n*TOTAL PIEZAS: ${pzs}*\n*TOTAL A PAGAR: $${total.toLocaleString()}*\n\n*Quedo al pendiente de su compra.*\n\n_* Precios sujetos a cambio sin previo aviso_`;
            if(m === 'wa') window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(t)}`, '_blank');
            else window.location.href = `mailto:?subject=Cotización Catosa - ${cli}&body=${encodeURIComponent(t)}`;
        }

        function checkInventory(q) {
            const box = document.getElementById('inv-res'); let list = [];
            if(!q) list = dbP.filter(p => parseInt(p.Existencia) <= 3).sort((a,b)=>parseInt(a.Existencia)-parseInt(b.Existencia)).slice(0,10);
            else list = dbP.filter(p => (p.Parte||'').toUpperCase().includes(q.toUpperCase()) || (p.Marca||'').toUpperCase().includes(q.toUpperCase())).slice(0,20);
            box.innerHTML = q ? '' : '<div style="font-size:0.6rem; color:var(--gold); text-align:center; margin-bottom:5px;">STOCK CRÍTICO</div>';
            list.forEach(p => {
                const qty = parseInt(p.Existencia)||0; let color = qty<=0?'var(--red)':(qty<=5?'var(--gold)':'var(--green)');
                box.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #222; font-size:0.75rem;"><div><b>${p.Parte}</b><br><small>${p.Marca}</small></div><b style="color:${color}">${qty} pz</b></div>`;
            });
        }

        function calcMyTop() {
            const list = document.getElementById('v-top-list'); if(!dbD.length || !user) return;
            let counts = {};
            dbD.filter(d => (d.Vendedor||"").toUpperCase().includes(user.Nombre.split(" ")[0].toUpperCase())).forEach(v => {
                const p = (v.Parte||v.SKU||"").toString().trim().toUpperCase();
                if(p && p !== "PARTE") counts[p] = (counts[p] || 0) + parseInt(v.Cantidad || 1);
            });
            const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
            list.innerHTML = '';
            sorted.forEach(([sku, qty], i) => {
                const sInfo = dbP.find(p => (p.Parte||"").toString().trim().toUpperCase() === sku);
                const sQty = sInfo ? parseInt(sInfo.Existencia) : 0;
                list.innerHTML += `<div class="prod-row"><div class="prod-rank-icon">${i+1}</div><div class="prod-info-main"><b>${sku}</b><small>${sInfo?sInfo.Marca:'FLEETRITE'}</small></div><div class="prod-stat-data"><b>${qty} vend.</b><small>${sQty} stock</small></div></div>`;
            });
        }
        function quickSearch(i) { const m = dbP.find(p => (p.Parte||'').toString().trim().toUpperCase() === i.value.trim().toUpperCase()); if(m) document.getElementById('p-prc').value = parseFloat(m.Precio.replace(/[^0-9.]/g, ''))||0; }
        function fillClie() { const dl = document.getElementById('cli-cot'); [...new Set(dbC.map(c=>c.Cliente))].forEach(c => dl.innerHTML += `<option value="${c}">`); }
    </script>
</body>
</html>
