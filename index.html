<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catosa GP - Official Race</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --red: #d21034;
            --bg: #222629;       /* GRIS RATA */
            --card: #1a1d20;     
            --green: #2ecc71;
            --blue: #3498db;
            --text: #f5f5f5;
            --asfalto: #181a1c; /* Gris asfalto */
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 2px solid rgba(255,255,255,0.05); margin-bottom: 10px; }
        .logo { max-height: 30px; }
        h1 { font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; color: #fff; margin: 0; text-align: center; flex: 1; }

        #status-bar { text-align: center; font-size: 0.6rem; color: #777; margin-bottom: 15px; }

        /* ========= NUEVA PISTA DE CARRERAS ========= */
        .race-track { 
            max-width: 1000px; margin: 0 auto 25px; 
            background: var(--asfalto); border-radius: 10px; padding: 20px 0; 
            border: 2px solid #333; box-shadow: inset 0 0 30px #000;
            position: relative; overflow: hidden;
        }

        /* Línea de Meta (Bandera de Cuadros) */
        .finish-line { 
            position: absolute; right: 0; top: 0; bottom: 0; width: 30px; 
            background-image: 
                linear-gradient(45deg, #fff 25%, transparent 25%), 
                linear-gradient(-45deg, #fff 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #fff 75%),
                linear-gradient(-45deg, transparent 75%, #fff 75%);
            background-size: 15px 15px;
            background-position: 0 0, 0 7.5px, 7.5px -7.5px, -7.5px 0px;
            background-color: #000;
            opacity: 0.8; z-index: 5;
            box-shadow: -5px 0 10px rgba(0,0,0,0.5);
        }

        .race-lane { height: 65px; position: relative; border-bottom: 1px dashed rgba(255,255,255,0.1); display: flex; align-items: center; }
        .race-lane:last-child { border-bottom: none; }

        /* Nombre del Vendedor Pro */
        .vendor-name { 
            position: absolute; left: 15px; top: 8px; 
            font-size: 11px; font-weight: bold; color: rgba(255,255,255,0.4);
            letter-spacing: 1px;
        }

        /* CAMIÓN INTERNATIONAL REALISTA */
        .international-truck { 
            position: absolute; bottom: 10px; left: 0; 
            width: 100px; height: 45px; /* Ajusta según tu imagen */
            background-image: url('camion-intl.png'); /* LA IMAGEN QUE SUBIRÁS */
            background-size: contain; background-repeat: no-repeat;
            transition: all 2s cubic-bezier(0.12, 0.76, 0.44, 0.99); /* Movimiento suave */
            filter: drop-shadow(0 4px 5px rgba(0,0,0,0.6));
            z-index: 10;
        }

        /* Brillo para el que va ganando */
        .international-truck.leader { filter: drop-shadow(0 0 15px var(--red)); }

        /* Porcentaje de avance */
        .pct-badge { position: absolute; right: -25px; top: -15px; background: rgba(0,0,0,0.7); color: var(--green); padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: bold; border: 1px solid var(--green); }

        /* ========= RESTO DE LA INTERFAZ (Gris Rata) ========= */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; max-width: 1100px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 10px; padding: 20px; border: 1px solid #333; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        h2 { font-size: 0.7rem; color: #666; text-transform: uppercase; margin-top: 0; margin-bottom: 15px; letter-spacing: 1px; }

        input { width: 100%; background: #000; border: 1px solid #333; padding: 12px; border-radius: 6px; color: #fff; margin: 8px 0; box-sizing: border-box; }
        .comm-circle { width: 140px; height: 140px; border-radius: 50%; border: 6px solid #111; margin: 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; border-top: 6px solid var(--blue); }
        .big-val { font-size: 2.2rem; color: var(--green); font-weight: bold; }

        .client-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; }
        .btn-ws { width: 100%; padding: 15px; border-radius: 8px; border: none; background: linear-gradient(135deg, #25d366 0%, #128c7e 100%); color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo-catosa.png" class="logo" alt="Catosa" onerror="this.style.display='none'">
        <h1>Catosa Official GP</h1>
        <img src="logo-international.png" class="logo" alt="Intl" onerror="this.style.display='none'">
    </div>

    <div id="status-bar">🛰️ Syncing data...</div>

    <div class="race-track">
        <div class="finish-line"></div>
        <div id="pista-competencia">
            </div>
    </div>

    <div class="grid">
        <div class="card">
            <h2>💰 Comisiones</h2>
            <div class="comm-circle">
                <div class="big-val" id="resCom">$0.00</div>
                <span style="font-size: 0.6rem; color:#444;">POTENCIAL</span>
            </div>
            <input type="number" id="vMonto" placeholder="Input Value" oninput="calc()">
        </div>

        <div class="card">
            <h2>📋 Cotizador</h2>
            <input type="text" id="cCliente" placeholder="Cliente...">
            <input type="text" id="cParte" placeholder="N° de Parte..." oninput="cotizar()">
            <div id="qBox" style="background:#0c0e10; padding:12px; border-radius:8px; border:1px solid #222;">
                <div id="qDesc" style="color:#555; font-size:0.75rem;">Ref: --</div>
                <div id="qTotal" style="font-size:1.6rem; color:#fff; font-weight:bold; margin-top:5px;">$0.00</div>
            </div>
            <button class="btn-ws" onclick="enviar()">📲 WhatsApp</button>
        </div>

        <div class="card">
            <h2>👥 Cartera</h2>
            <div id="lista"></div>
        </div>
    </div>

    <script>
        // ENLACES CSV (Sin bypass caché para asegurar carga)
        const URL_V = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=0&single=true&output=csv`;
        const URL_P = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1610979668&single=true&output=csv`;

        let dbV = [], dbP = [], itemSel = null;

        const val = (obj, index) => {
            const keys = Object.keys(obj);
            return obj[keys[index]];
        };

        async function init() {
            Papa.parse(URL_V, { download: true, header: true, complete: (r) => { dbV = r.data; renderV(); check(); } });
            Papa.parse(URL_P, { download: true, header: true, complete: (r) => { dbP = r.data; check(); } });
        }

        function check() {
            if(dbV.length > 0 && dbP.length > 0) {
                document.getElementById('status-bar').innerText = "● DATA SYNC OK";
                document.getElementById('status-bar').style.color = "var(--green)";
            }
        }

        function renderV() {
            const p = document.getElementById('pista-competencia');
            p.innerHTML = ''; 
            
            let maxPct = 0;
            let leaderIndex = -1;

            // Primero calculamos quién va ganando
            dbV.forEach((f, index) => {
                const ven = parseFloat(val(f, 1)) || 0, met = parseFloat(val(f, 2)) || 1;
                const pct = (ven/met);
                if(pct > maxPct) { maxPct = pct; leaderIndex = index; }
            });

            // Generamos la pista
            dbV.forEach((f, index) => {
                const nom = val(f, 0), ven = parseFloat(val(f, 1)) || 0, met = parseFloat(val(f, 2)) || 1;
                if(nom) {
                    const pct = Math.min(100, (ven/met)*100);
                    const isLeader = (index === leaderIndex && pct > 0);
                    
                    p.innerHTML += `
                        <div class="race-lane">
                            <div class="vendor-name">${nom.toUpperCase()}</div>
                            <div class="international-truck ${isLeader ? 'leader' : ''}" style="left:calc(${pct}% - 100px)">
                                <div class="pct-badge">${pct.toFixed(0)}%</div>
                            </div>
                        </div>`;
                }
            });
        }

        // ... resto de funciones (cotizar, enviar, calc) iguales ...
        function cotizar() {
            const pIn = document.getElementById('cParte').value.trim().toUpperCase();
            const cIn = document.getElementById('cCliente').value.trim().toUpperCase();
            itemSel = dbP.find(x => {
                const pEx = (val(x, 0) || "").toString().toUpperCase();
                const cEx = (val(x, 3) || "").toString().toUpperCase();
                return pEx === pIn && (cEx === cIn || cEx === "");
            });
            if(itemSel) {
                const pre = parseFloat(val(itemSel, 1)) || 0;
                document.getElementById('qDesc').innerText = val(itemSel, 2) || val(itemSel, 0);
                document.getElementById('qTotal').innerText = "$" + pre.toLocaleString();
            }
        }

        function calc() {
            const com = (document.getElementById('vMonto').value * 0.25) * 0.03;
            document.getElementById('resCom').innerText = "$" + com.toLocaleString(undefined, {maximumFractionDigits:0});
        }

        function enviar() {
            if(!itemSel) return;
            const msg = encodeURIComponent(`*CATOSA*\nRef: ${document.getElementById('qDesc').innerText}\nTotal: ${document.getElementById('qTotal').innerText}`);
            window.open(`https://wa.me/?text=${msg}`, '_blank');
        }

        window.onload = init;
    </script>
</body>
</html>
