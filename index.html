<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catosa GP - Asesor Elite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --red: #d21034; --bg: #0c0e10; --card: #1a1d20; --green: #00ff88; --blue: #00d4ff; --text: #f5f5f5; --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* LOGIN */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; border-top: 5px solid var(--red); text-align: center; width: 280px; }
        #main-app { display: none; }
        
        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 2px solid #333; margin-bottom: 15px; }
        .user-info { text-align: center; border: 1px solid var(--blue); padding: 5px 15px; border-radius: 5px; }

        /* TIEMPO Y FALTANTE */
        .time-panel { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        .time-item { text-align: center; flex: 1; }
        .time-label { font-size: 0.5rem; color: #888; display: block; text-transform: uppercase; }
        .time-value { font-size: 0.85rem; font-weight: bold; }

        /* KPIs */
        .top-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 15px; }
        .top-card { background: var(--card); padding: 8px 2px; border-radius: 8px; text-align: center; border-bottom: 2px solid var(--blue); }
        .top-card span { font-size: 0.5rem; color: #888; display: block; text-transform: uppercase; }
        .top-card b { font-size: 0.75rem; color: var(--green); }

        /* PISTA CON LÍNEAS */
        .race-track { background: #050505; border-radius: 15px; padding: 25px 0; border: 1px solid #333; position: relative; overflow: hidden; margin-bottom: 15px; height: 75px; }
        .line-meta { position: absolute; top: 0; bottom: 0; width: 2px; z-index: 1; opacity: 0.4; }
        .l-85 { left: 73.9%; border-left: 2px dashed var(--bronze); }
        .l-100 { left: 86.9%; border-left: 2px dashed var(--silver); }
        .l-115 { right: 0; width: 15px; background: repeating-linear-gradient(45deg, #fff, #fff 5px, #000 5px, #000 10px); opacity: 0.2; border-left: 2px solid var(--gold); }
        
        .truck { position: absolute; bottom: 15px; left: 0; width: 80px; height: 40px; background-image: url('camion-intl.png'); background-size: contain; background-repeat: no-repeat; transition: 3s cubic-bezier(0.1, 0.5, 0.1, 1); z-index: 10; }
        .truck.bronce { filter: drop-shadow(0 0 12px var(--bronze)); }
        .truck.plata { filter: drop-shadow(0 0 18px var(--silver)); }
        .truck.oro { filter: drop-shadow(0 0 25px var(--gold)); animation: turbo 1s infinite alternate; }
        @keyframes turbo { from { transform: scale(1); } to { transform: scale(1.05); } }

        /* CARTERA */
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #333; margin-bottom: 15px; }
        .client-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; }
        .semaforo { display: flex; flex-direction: column; gap: 3px; margin-right: 12px; }
        .light { width: 10px; height: 10px; border-radius: 50%; opacity: 0.1; }
        .light.on { opacity: 1; box-shadow: 0 0 8px currentColor; }

        input, select { width: 100%; background: #000; border: 1px solid #333; padding: 10px; border-radius: 8px; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
        .btn { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: #fff; background: var(--red); text-transform: uppercase; width: 100%; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <img src="logo-catosa.png" style="max-height: 40px; margin-bottom: 20px;">
            <input type="text" id="u-name" placeholder="NOMBRE">
            <input type="password" id="u-pass" placeholder="PASSWORD">
            <button class="btn" onclick="login()">ENTRAR</button>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <img src="logo-catosa.png" style="max-height: 20px;">
            <div class="user-info"><b id="u-disp" style="font-size: 0.7rem; display: block;">--</b><small id="s-disp" style="color: var(--blue); font-size: 0.6rem;">--</small></div>
            <button class="btn" style="width:auto; padding:5px 10px; background:none; border:1px solid var(--red); color:var(--red);" onclick="location.reload()">SALIR</button>
        </div>

        <div class="time-panel">
            <div class="time-item">
                <span class="time-label">Hoy</span>
                <span class="time-value" id="val-hoy">--</span>
            </div>
            <div class="time-item" style="border-left: 1px solid #333; border-right: 1px solid #333;">
                <span class="time-label">Cierre en</span>
                <span class="time-value" id="val-dias" style="color: var(--red);">--</span>
            </div>
            <div class="time-item">
                <span class="time-label">Falta para Oro</span>
                <span class="time-value" id="val-falta-oro" style="color: var(--gold);">$0</span>
            </div>
        </div>

        <div class="top-stats">
            <div class="top-card"><span>Ventas</span><b id="k-v">$0</b></div>
            <div class="top-card"><span>Utilidad</span><b id="k-u">$0</b></div>
            <div class="top-card"><span>Margen</span><b id="k-m">0%</b></div>
            <div class="top-card"><span>Alcance</span><b id="k-p">0%</b></div>
        </div>

        <div class="race-track">
            <div class="line-meta l-85"></div>
            <div class="line-meta l-100"></div>
            <div class="line-meta l-115"></div>
            <div id="mi-camion" class="truck"></div>
        </div>

        <button class="btn" style="background:var(--blue); margin-bottom:15px;" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSd8lCHVlqTobNSlLxKr7b9y_kkxH9XFPPMhkAKa_eW5IaPueQ/viewform','_blank')">📝 REGISTRAR GESTIÓN</button>

        <div class="card">
            <h2>👥 Mi Cartera</h2>
            <input type="text" id="f-cli" placeholder="Buscar cliente..." oninput="renderApp()">
            <div id="lista-cli"></div>
        </div>
    </div>

    <script>
        const L = {
            v: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=0&single=true&output=csv",
            c: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1068966462&single=true&output=csv"
        };
        let dbV=[], dbC=[], user=null, cnf=false;

        window.onload = () => {
            Papa.parse(L.v, { download:true, header:true, complete: r => dbV=r.data });
            Papa.parse(L.c, { download:true, header:true, complete: r => dbC=r.data });
        };

        function login() {
            const n = document.getElementById('u-name').value.trim().toUpperCase();
            const p = document.getElementById('u-pass').value.trim().toUpperCase();
            const f = dbV.find(v => (v.Nombre||"").toUpperCase().includes(n) && (p === (v.Nombre||"").split(" ").pop() + "123" || p === 'CATOSA2026'));
            if(f){ user=f; document.getElementById('login-screen').style.display='none'; document.getElementById('main-app').style.display='block'; 
                document.getElementById('u-disp').innerText=user.Nombre; document.getElementById('s-disp').innerText=user.Sucursal; renderApp(); }
            else alert("Acceso denegado");
        }

        function renderApp() {
            const vr = parseFloat(user.Ventas.replace(/[^0-9.]/g,''))||0, vm = parseFloat(user.Meta.replace(/[^0-9.]/g,''))||1;
            const ut = parseFloat(user.Utilidad.replace(/[^0-9.]/g,''))||(vr*0.22), pct = (vr/vm)*100;
            
            // Tiempo y Faltante
            const hoy = new Date(), ult = new Date(hoy.getFullYear(), hoy.getMonth() + 1, 0).getDate();
            const rest = (ult - hoy.getDate()) + 1;
            document.getElementById('val-hoy').innerText = hoy.toLocaleDateString('es-MX', {day:'numeric', month:'short'}).toUpperCase();
            document.getElementById('val-dias').innerText = rest + " Días";
            document.getElementById('val-falta-oro').innerText = "$" + Math.max(0, Math.floor(vm*1.15 - vr)).toLocaleString();

            document.getElementById('k-v').innerText="$"+Math.floor(vr).toLocaleString();
            document.getElementById('k-u').innerText="$"+Math.floor(ut).toLocaleString();
            document.getElementById('k-m').innerText=((ut/vr)*100||0).toFixed(1)+"%";
            document.getElementById('k-p').innerText=pct.toFixed(1)+"%";
            
            const t = document.getElementById('mi-camion'); t.style.left=`calc(${Math.min(100,(pct/115)*100)}% - 75px)`;
            t.classList.remove('bronce','plata','oro');
            if(pct>=115){ t.classList.add('oro'); if(!cnf){confetti();cnf=true;} }
            else if(pct>=100) t.classList.add('plata'); else if(pct>=85) t.classList.add('bronce');
            
            const lc = document.getElementById('lista-cli'), f = document.getElementById('f-cli').value.toLowerCase();
            lc.innerHTML=''; 
            dbC.filter(c => (c.Vendedor||"").toUpperCase() === (user.Nombre||"").toUpperCase() && c.Cliente.toLowerCase().includes(f))
            .forEach(c => {
                const d = parseInt(c.Dias)||0;
                const vMes = parseFloat(c.Venta_Mes) || 0; // Asegúrate que la columna se llame así
                lc.innerHTML+=`
                    <div class="client-row">
                        <div style="display:flex; align-items:center;">
                            <div class="semaforo">
                                <div class="light ${d<=14?'on':''}" style="background:#0f0;"></div>
                                <div class="light ${d>14&&d<=60?'on':''}" style="background:#ff0;"></div>
                                <div class="light ${d>60?'on':''}" style="background:#f00;"></div>
                            </div>
                            <div><b>${c.Cliente}</b><br><small>${d} días inactivo</small></div>
                        </div>
                        <div style="text-align:right;">
                            <b style="color:var(--green); font-size:0.85rem;">$${Math.floor(vMes).toLocaleString()}</b>
                            <small style="display:block; font-size:0.5rem; color:#666;">VENTA MES</small>
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
