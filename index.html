<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catosa GP - Official Sales App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --red: #d21034; --bg: #32373c; --card: #1a1d20; --green: #2ecc71; --blue: #3498db; --text: #f5f5f5; --asfalto: #181a1c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 2px solid rgba(255,255,255,0.1); margin-bottom: 10px; }
        .logo { max-height: 30px; }
        h1 { font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; text-align: center; flex: 1; margin: 0; }
        #status-bar { text-align: center; font-size: 0.65rem; color: #ffab00; margin-bottom: 15px; }

        /* PISTA */
        .race-track { max-width: 1000px; margin: 0 auto 20px; background: var(--asfalto); border-radius: 10px; padding: 15px 0; border: 2px solid #333; position: relative; overflow: hidden; }
        .finish-line { position: absolute; right: 0; top: 0; bottom: 0; width: 30px; background-image: linear-gradient(45deg, #fff 25%, transparent 25%), linear-gradient(-45deg, #fff 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #fff 75%), linear-gradient(-45deg, transparent 75%, #fff 75%); background-size: 15px 15px; background-color: #000; opacity: 0.5; }
        .race-lane { height: 50px; position: relative; border-bottom: 1px dashed rgba(255,255,255,0.1); display: flex; align-items: center; }
        .vendor-name { position: absolute; left: 10px; top: 5px; font-size: 9px; font-weight: bold; color: rgba(255,255,255,0.3); }
        .international-truck { position: absolute; bottom: 5px; left: 0; width: 80px; height: 35px; background-image: url('camion-intl.png'); background-size: contain; background-repeat: no-repeat; transition: all 2s; }
        .leader { filter: drop-shadow(0 0 10px var(--red)); }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #333; }
        h2 { font-size: 0.7rem; color: #666; text-transform: uppercase; margin: 0 0 15px 0; }

        /* COTIZADOR */
        input { width: 100%; background: #000; border: 1px solid #333; padding: 12px; border-radius: 6px; color: #fff; margin: 5px 0; box-sizing: border-box; }
        .qty-row { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; }
        .btn-add { background: var(--blue); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; width: 100%; margin: 10px 0; cursor: pointer; }
        .lista-carrito { background: #0c0e10; border: 1px solid #222; border-radius: 8px; margin-top: 10px; padding: 10px; font-size: 0.8rem; max-height: 150px; overflow-y: auto; }
        .item-carrito { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 5px 0; }
        .total-carrito { color: var(--green); font-size: 1.2rem; font-weight: bold; text-align: center; margin-top: 10px; border-top: 1px solid #444; padding-top: 10px; }

        /* CARTERA CON FECHA */
        .client-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #222; }
        .traffic-light { display: flex; flex-direction: column; gap: 3px; background: #000; padding: 6px; border-radius: 15px; width: 20px; border: 1px solid #333; margin-right: 15px; }
        .light { width: 12px; height: 12px; border-radius: 50%; opacity: 0.1; }
        .light.on { opacity: 1; box-shadow: 0 0 8px currentColor; }
        .client-info { flex: 1; }
        .client-name { font-size: 13px; font-weight: bold; display: block; }
        .client-date { font-size: 10px; color: #777; margin-top: 2px; }
        .client-days { font-size: 10px; color: var(--red); font-weight: bold; text-align: right; min-width: 40px; }

        /* BOTONES */
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-action { padding: 14px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.65rem; }
        .btn-ws { background: linear-gradient(135deg, #25d366 0%, #128c7e 100%); }
        .btn-mail { background: linear-gradient(135deg, #555 0%, #333 100%); }
        .btn-clear { background: #444; width: 100%; margin-top: 5px; font-size: 0.6rem; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo-catosa.png" class="logo" onerror="this.style.display='none'">
        <h1>Catosa GP | Admin Panel</h1>
        <img src="logo-international.png" class="logo" onerror="this.style.display='none'">
    </div>

    <div id="status-bar">🛰️ Conectando...</div>

    <div class="race-track">
        <div class="finish-line"></div>
        <div id="pista-competencia"></div>
    </div>

    <div class="grid">
        <div class="card">
            <h2>📋 Multi-Cotizador</h2>
            <input type="text" id="cCliente" placeholder="Nombre del Cliente...">
            <input type="text" id="cParte" placeholder="N° de Parte..." oninput="buscarParte()">
            
            <div id="temp-info" style="font-size: 0.75rem; color: #888; margin-top: 5px;">
                Ref: <span id="qDesc">--</span> | Unit: $<span id="qUnit">0</span>
            </div>

            <div class="qty-row">
                <input type="number" id="cCant" value="1" min="1" placeholder="Cant.">
                <button class="btn-add" onclick="agregarAlCarrito()">➕ Añadir</button>
            </div>

            <div class="lista-carrito" id="carrito-box">
                <div style="text-align:center; color:#444;">Lista vacía</div>
            </div>
            
            <div class="total-carrito">Total: <span id="total-general">$0.00</span></div>

            <div class="btn-group">
                <button class="btn-action btn-ws" onclick="enviar('ws')">📲 WhatsApp</button>
                <button class="btn-action btn-mail" onclick="enviar('mail')">✉️ E-mail</button>
            </div>
            <button class="btn-action btn-clear" onclick="limpiarCarrito()">Limpiar Lista</button>
        </div>

        <div class="card" style="text-align: center;">
            <h2>💰 Mis Comisiones</h2>
            <div style="width:110px; height:110px; border-radius:50%; border:5px solid #111; border-top-color:var(--blue); margin: 0 auto; display:flex; flex-direction:column; justify-content:center;">
                <div style="font-size:1.5rem; color:var(--green); font-weight:bold;" id="resCom">$0</div>
                <small style="font-size:0.5rem; color:#444;">POTENCIAL</small>
            </div>
            <input type="number" id="vMonto" placeholder="Venta del día ($)" oninput="calcCom()" style="text-align:center; margin-top:15px;">
        </div>

        <div class="card">
            <h2>👥 Cartera de Clientes</h2>
            <div id="lista-clientes"></div>
        </div>
    </div>

    <script>
        const URL_V = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=0&single=true&output=csv&t=${new Date().getTime()}`;
        const URL_P = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1610979668&single=true&output=csv&t=${new Date().getTime()}`;

        let dbV = [], dbP = [], carrito = [], itemTemp = null;

        const getVal = (obj, keyword) => {
            if (!obj) return null;
            const keys = Object.keys(obj);
            const foundKey = keys.find(k => k.trim().toLowerCase().includes(keyword.toLowerCase()));
            return foundKey ? obj[foundKey] : null;
        };

        async function init() {
            Papa.parse(URL_V, { download: true, header: true, skipEmptyLines: true, complete: (r) => { dbV = r.data; renderV(); } });
            Papa.parse(URL_P, { download: true, header: true, skipEmptyLines: true, complete: (r) => { 
                dbP = r.data; 
                document.getElementById('status-bar').innerText = "● SISTEMA SINCRONIZADO";
                document.getElementById('status-bar').style.color = "var(--green)";
            } });
        }

        function renderV() {
            const p = document.getElementById('pista-competencia'), l = document.getElementById('lista-clientes');
            p.innerHTML = ''; l.innerHTML = '';
            let max = 0, leader = -1;

            dbV.forEach((f, i) => {
                const pct = (parseFloat(getVal(f, 'Ventas')) || 0) / (parseFloat(getVal(f, 'Meta')) || 1);
                if(pct > max) { max = pct; leader = i; }
            });

            dbV.forEach((f, i) => {
                const nom = getVal(f, 'Nombre'), ven = parseFloat(getVal(f, 'Ventas')) || 0, met = parseFloat(getVal(f, 'Meta')) || 1;
                if(nom) {
                    const pCalc = Math.min(100, (ven/met)*100);
                    p.innerHTML += `<div class="race-lane"><div class="vendor-name">${nom.toUpperCase()}</div><div class="international-truck ${i===leader ? 'leader' : ''}" style="left:calc(${pCalc}% - 80px)"></div></div>`;
                }

                // CARTERA MEJORADA CON FECHA
                const cli = getVal(f, 'Cliente');
                const d = parseInt(getVal(f, 'Dias')) || 0;
                const fch = getVal(f, 'Fecha') || getVal(f, 'Ultima') || "Sin fecha";

                if(cli) {
                    l.innerHTML += `
                        <div class="client-row">
                            <div class="traffic-light">
                                <div class="light ${d <= 14 ? 'on' : ''}" style="color:#0f0; background:#0f0;"></div>
                                <div class="light ${d > 14 && d <= 60 ? 'on' : ''}" style="color:#ff0; background:#ff0;"></div>
                                <div class="light ${d > 60 ? 'on' : ''}" style="color:#f00; background:#f00;"></div>
                            </div>
                            <div class="client-info">
                                <span class="client-name">${cli}</span>
                                <span class="client-date">Última compra: ${fch}</span>
                            </div>
                            <div class="client-days">${d}d</div>
                        </div>`;
                }
            });
        }

        function buscarParte() {
            const pIn = document.getElementById('cParte').value.trim().toUpperCase();
            const cIn = document.getElementById('cCliente').value.trim().toUpperCase();
            itemTemp = dbP.find(x => {
                const pEx = (getVal(x, 'Parte') || "").toString().toUpperCase();
                const cEx = (getVal(x, 'Especial') || "").toString().toUpperCase();
                return pEx === pIn && (cEx === cIn || cEx === "");
            });
            if(itemTemp) {
                document.getElementById('qDesc').innerText = getVal(itemTemp, 'Descripcion') || "Encontrado";
                document.getElementById('qUnit').innerText = parseFloat(getVal(itemTemp, 'Precio')).toLocaleString();
            } else {
                document.getElementById('qDesc').innerText = "--";
                document.getElementById('qUnit').innerText = "0";
            }
        }

        function agregarAlCarrito() {
            if(!itemTemp) return;
            const cant = parseInt(document.getElementById('cCant').value) || 1;
            const precio = parseFloat(getVal(itemTemp, 'Precio'));
            carrito.push({ desc: getVal(itemTemp, 'Descripcion') || getVal(itemTemp, 'Parte'), cant: cant, unit: precio, sub: precio * cant });
            document.getElementById('cParte').value = '';
            itemTemp = null;
            renderCarrito();
        }

        function renderCarrito() {
            const box = document.getElementById('carrito-box'), totalBox = document.getElementById('total-general');
            if(carrito.length === 0) { box.innerHTML = "Lista vacía"; totalBox.innerText = "$0.00"; return; }
            let html = '', total = 0;
            carrito.forEach(it => {
                html += `<div class="item-carrito"><span>${it.cant}x ${it.desc}</span><b>$${it.sub.toLocaleString()}</b></div>`;
                total += it.sub;
            });
            box.innerHTML = html;
            totalBox.innerText = "$" + total.toLocaleString();
        }

        function limpiarCarrito() { carrito = []; renderCarrito(); }

        function enviar(tipo) {
            if(carrito.length === 0) return;
            const cli = document.getElementById('cCliente').value || "Cliente";
            let total = 0, msg = `*CATOSA - COTIZACIÓN*\n👤 *Cliente:* ${cli}\n--------------------------\n`;
            carrito.forEach(it => {
                msg += `• ${it.cant}x ${it.desc} ($${it.unit.toLocaleString()} c/u) = *$${it.sub.toLocaleString()}*\n`;
                total += it.sub;
            });
            msg += `--------------------------\n*TOTAL: $${total.toLocaleString()}*\n\nQuedo a tus órdenes.`;
            if(tipo === 'ws') window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            else window.location.href = `mailto:?subject=Cotización&body=${encodeURIComponent(msg.replace(/\*/g,''))}`;
        }

        function calcCom() {
            const v = document.getElementById('vMonto').value;
            document.getElementById('resCom').innerText = "$" + Math.floor((v * 0.25) * 0.03).toLocaleString();
        }

        window.onload = init;
    </script>
</body>
</html>
