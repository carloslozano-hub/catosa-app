<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catosa GP - Asesores Elite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --red: #d21034; --bg: #0c0e10; --card: #1a1d20; --green: #00ff88; --blue: #00d4ff; --text: #f5f5f5; --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; border-top: 5px solid var(--red); text-align: center; width: 280px; }
        #main-app { display: none; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 2px solid #333; margin-bottom: 15px; }

        /* PISTA DISEÑADA */
        .race-track { background: #050505; border-radius: 15px; padding: 25px 0; border: 1px solid #333; position: relative; overflow: hidden; margin-bottom: 15px; height: 75px; box-shadow: inset 0 0 20px #000; }
        .line-100 { position: absolute; left: 86.9%; top: 0; bottom: 0; width: 2px; background: var(--silver); opacity: 0.5; border-left: 1px dashed white; z-index: 1; }
        .line-115 { position: absolute; right: 0; top: 0; bottom: 0; width: 15px; background: repeating-linear-gradient(45deg, #fff, #fff 5px, #000 5px, #000 10px); opacity: 0.5; border-left: 2px solid var(--gold); z-index: 1; }
        
        /* CAMIÓN A COLOR SIEMPRE */
        .truck { position: absolute; bottom: 15px; left: 0; width: 80px; height: 40px; background-image: url('camion-intl.png'); background-size: contain; background-repeat: no-repeat; transition: 3s cubic-bezier(0.1, 0.5, 0.1, 1); z-index: 10; }
        
        /* EFECTOS DE CONTORNO NEÓN */
        .truck.bronce { filter: drop-shadow(0 0 12px var(--bronze)) brightness(1.1); }
        .truck.plata { filter: drop-shadow(0 0 18px var(--silver)) brightness(1.2); }
        .truck.oro { filter: drop-shadow(0 0 25px var(--gold)) brightness(1.3); animation: turbo 1s infinite alternate; }
        @keyframes turbo { from { transform: scale(1); } to { transform: scale(1.05); } }

        /* CALCULADORA CALENDARIO */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .day-box { background: #000; border: 1px solid #333; border-radius: 4px; padding: 4px; text-align: center; }
        .day-in { width: 100%; background: transparent; border: none; color: var(--green); font-size: 0.8rem; text-align: center; outline: none; font-weight: bold; }

        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #333; margin-bottom: 15px; }
        .btn { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: #fff; background: var(--red); text-transform: uppercase; width: 100%; font-size: 0.8rem; }
        .btn-reporte { background: var(--blue); margin-bottom: 15px; box-shadow: 0 0 15px rgba(0, 212, 255, 0.3); }
        
        .client-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #222; }
        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 12px; }
        input { width: 100%; background: #000; border: 1px solid #333; padding: 10px; border-radius: 8px; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <img src="logo-catosa.png" style="max-height: 40px; margin-bottom: 20px;">
            <input type="text" id="u-name" placeholder="USUARIO">
            <input type="password" id="u-pass" placeholder="PASSWORD">
            <button class="btn" onclick="login()">ENTRAR</button>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <img src="logo-catosa.png" style="max-height: 20px;">
            <div style="text-align: right;"><b id="u-disp" style="font-size: 0.7rem; display: block;">--</b><small id="s-disp" style="color: var(--blue); font-size: 0.6rem;">--</small></div>
        </div>

        <button class="btn btn-reporte" onclick="abrirReporte()">📝 REGISTRAR GESTIÓN / VISITA</button>

        <div class="race-track">
            <div class="line-100"></div>
            <div class="line-115"></div>
            <div id="mi-camion" class="truck"></div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">
            <div class="card" style="text-align:center; padding:10px;"><span>VENTA</span><b id="k-v" style="display:block; color:var(--green); font-size:1.2rem;">$0</b></div>
            <div class="card" style="text-align:center; padding:10px;"><span>ALCANCE</span><b id="k-p" style="display:block; color:var(--blue); font-size:1.2rem;">0%</b></div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between;"><h2>💰 CALCULADORA</h2><b id="metal" style="font-size:0.6rem; padding:2px 6px; border-radius:4px; background:#333;">S/N</b></div>
            <div style="display:flex; justify-content:space-between; margin:8px 0; font-size:0.8rem;"><span id="r-v" style="color:var(--green)">$0</span><span id="r-c" style="color:var(--blue)">$0</span></div>
            <div class="cal-grid" id="cal-grid"></div>
        </div>

        <div class="card">
            <h2>👥 MI CARTERA (Semaforizada)</h2>
            <input type="text" id="f-cli" placeholder="Buscar cliente..." oninput="renderApp()">
            <div id="lista-cli"></div>
        </div>
    </div>

    <script>
        // TU FORMULARIO (Se abre en pestaña nueva para evitar errores de Google)
        const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSd8lCHVlqTobNSlLxKr7b9y_kkxH9XFPPMhkAKa_eW5IaPueQ/viewform";

        const L = {
            v: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=0&single=true&output=csv",
            c: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1068966462&single=true&output=csv"
        };

        let dbV=[], dbC=[], user=null, cnf=false;

        window.onload = () => {
            const cg = document.getElementById('cal-grid');
            for(let i=1; i<=31; i++) {
                cg.innerHTML += `<div class="day-box"><small style="font-size:0.4rem;color:#555;display:block;">${i}</small><input type="number" class="day-in" oninput="sumCal()"></div>`;
            }
            Papa.parse(L.v, { download:true, header:true, complete: r => dbV=r.data });
            Papa.parse(L.c, { download:true, header:true, complete: r => dbC=r.data });
        };

        function abrirReporte() { window.open(FORM_URL, '_blank'); }

        function login() {
            const n = document.getElementById('u-name').value.toUpperCase();
            const p = document.getElementById('u-pass').value.toUpperCase();
            const f = dbV.find(v => (v.Nombre||"").toUpperCase().includes(n) && (p === (v.Nombre||"").split(" ").pop() + "123" || p === 'CATOSA2026'));
            if(f){ 
                user=f; 
                document.getElementById('login-screen').style.display='none'; 
                document.getElementById('main-app').style.display='block'; 
                document.getElementById('u-disp').innerText=user.Nombre; 
                document.getElementById('s-disp').innerText=user.Sucursal; 
                renderApp(); 
            } else alert("Error de Login");
        }

        function renderApp() {
            const vr = parseFloat(user.Ventas.replace(/[^0-9.]/g,''))||0;
            const vm = parseFloat(user.Meta.replace(/[^0-9.]/g,''))||1;
            const pct = (vr/vm)*100;

            document.getElementById('k-v').innerText="$"+vr.toLocaleString();
            document.getElementById('k-p').innerText=pct.toFixed(1)+"%";

            const t = document.getElementById('mi-camion');
            const trackPct = Math.min(100, (pct/115)*100); 
            t.style.left=`calc(${trackPct}% - 75px)`;

            t.classList.remove('bronce','plata','oro');
            if(pct>=115){ t.classList.add('oro'); if(!cnf){confetti();cnf=true;}}
            else if(pct>=100) t.classList.add('plata');
            else if(pct>=85) t.classList.add('bronce');

            const lc = document.getElementById('lista-cli'), f = document.getElementById('f-cli').value.toLowerCase();
            lc.innerHTML='';
            dbC.filter(c => (c.Vendedor||"").toUpperCase() === user.Nombre.toUpperCase() && c.Cliente.toLowerCase().includes(f))
            .forEach(c => {
                const d = parseInt(c.Dias)||0;
                const col = d<=14?'#0f0':(d<=60?'#ff0':'#f00');
                lc.innerHTML+=`<div class="client-row"><div class="dot" style="background:${col};box-shadow:0 0 5px ${col}"></div><div style="flex:1"><b>${c.Cliente}</b><br><small>Inactividad: ${d} días</small></div></div>`;
            });
            sumCal();
        }

        function sumCal() {
            let s=0; document.querySelectorAll('.day-in').forEach(i=>s+=parseFloat(i.value)||0);
            const vm=parseFloat(user.Meta.replace(/[^0-9.]/g,''))||1, pct=(s/vm)*100, b=document.getElementById('metal');
            document.getElementById('r-v').innerText="Venta: $"+s.toLocaleString();
            document.getElementById('r-c').innerText="Comi: $"+(s*0.015).toLocaleString();
            
            b.innerText = pct>=115?'ORO':(pct>=100?'PLATA':(pct>=85?'BRONCE':'S/N'));
            b.style.background = pct>=115?'var(--gold)':(pct>=100?'var(--silver)':(pct>=85?'var(--bronze)':'#333'));
            b.style.color = pct>=85?'#000':'#fff';
        }
    </script>
</body>
</html>
