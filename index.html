<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catosa GP - Performance Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --red: #d21034; --bg: #32373c; --card: #1a1d20; 
            --green: #00ff88; --blue: #00d4ff; --text: #f5f5f5; --asfalto: #181a1c; 
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* LOGIN */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--red); width: 85%; max-width: 350px; text-align: center; }
        
        #main-app { display: none; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 2px solid #444; margin-bottom: 15px; }
        .logo { max-height: 25px; }
        h1 { font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; text-align: center; flex: 1; margin: 0; }

        /* PISTA */
        .race-track { max-width: 1000px; margin: 0 auto 20px; background: var(--asfalto); border-radius: 10px; padding: 15px 0; border: 2px solid #444; position: relative; overflow: hidden; box-shadow: inset 0 0 30px #000; }
        .finish-line { position: absolute; right: 0; top: 0; bottom: 0; width: 30px; background-image: linear-gradient(45deg, #fff 25%, transparent 25%), linear-gradient(-45deg, #fff 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #fff 75%), linear-gradient(-45deg, transparent 75%, #fff 75%); background-size: 15px 15px; background-color: #000; opacity: 0.4; }
        .race-lane { height: 50px; position: relative; display: flex; align-items: center; border-bottom: 1px dashed rgba(255,255,255,0.05); }
        .vendor-tag { position: absolute; left: 10px; top: 3px; font-size: 8px; color: rgba(255,255,255,0.2); }
        .truck { position: absolute; bottom: 5px; left: 0; width: 80px; height: 35px; background-image: url('camion-intl.png'); background-size: contain; background-repeat: no-repeat; transition: 2s; }
        .truck.my-truck { filter: drop-shadow(0 0 8px var(--blue)); border-bottom: 2px solid var(--blue); }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 15px; max-width: 1400px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; padding: 18px; border: 1px solid #333; }
        h2 { font-size: 0.7rem; color: #888; text-transform: uppercase; margin: 0 0 12px 0; border-left: 3px solid var(--red); padding-left: 10px; }

        /* CALENDARIO REFORMADO */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .day-box { background: #000; border: 1px solid #333; border-radius: 6px; padding: 8px 4px; text-align: center; }
        .day-num { font-size: 0.6rem; color: #666; display: block; margin-bottom: 4px; }
        .day-in { width: 100%; background: transparent; border: none; color: var(--green); font-size: 0.85rem; font-weight: bold; text-align: center; outline: none; }
        .day-in::placeholder { color: #222; }

        /* COTIZADOR MULTI-PRODUCTO */
        input { width: 100%; background: #000; border: 1px solid #333; padding: 12px; border-radius: 8px; color: #fff; margin: 5px 0; box-sizing: border-box; }
        .qty-row { display: grid; grid-template-columns: 2fr 1fr; gap: 8px; margin: 10px 0; }
        .btn-add { background: var(--blue); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; height: 45px; }
        .cart-box { background: #0c0e10; border-radius: 8px; padding: 10px; font-size: 0.75rem; margin-top: 10px; border: 1px solid #222; min-height: 60px; }
        .cart-item { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 6px 0; }
        
        /* CARTERA */
        .client-row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; }
        .t-light { display: flex; flex-direction: column; gap: 3px; background: #000; padding: 6px; border-radius: 15px; width: 16px; border: 1px solid #333; margin-right: 15px; }
        .light { width: 10px; height: 10px; border-radius: 50%; opacity: 0.1; }
        .light.on { opacity: 1; box-shadow: 0 0 10px currentColor; }

        .btn { padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; color: #fff; width: 100%; }
        .btn-ws { background: linear-gradient(135deg, #25d366, #128c7e); margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <img src="logo-catosa.png" style="max-height: 40px; margin-bottom: 20px;">
            <input type="text" id="user-name" placeholder="USUARIO (Nombre)" style="text-align: center; text-transform: uppercase;">
            <input type="password" id="user-pass" placeholder="CONTRASEÑA (Apellido123)" style="text-align: center;">
            <button class="btn" style="background:var(--red)" onclick="login()">INGRESAR</button>
            <p id="login-error" style="color:var(--red); font-size:0.6rem; margin-top:10px; display:none;">Error: Revisa tus datos.</p>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <img src="logo-catosa.png" class="logo">
            <h1>PERFORMANCE: <span id="user-display" style="color:var(--red)">--</span></h1>
            <button onclick="location.reload()" style="background:none; border:none; color:#555; font-size:0.6rem;">SALIR</button>
        </div>

        <div class="race-track">
            <div class="finish-line"></div>
            <div id="pista-global"></div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>📅 Mi Meta Diaria</h2>
                <div style="display:flex; justify-content:space-between; font-size:0.7rem; margin-bottom:10px;">
                    <span>ALCANCE: <b id="pct-alcance" style="color:var(--green)">0%</b></span>
                    <span>BONO: <b id="rango-bono">--</b></span>
                </div>
                <div style="background:#000; height:10px; border-radius:10px; overflow:hidden; margin-bottom:15px;">
                    <div id="bar-fill" style="height:100%; background:var(--green); width:0%; transition:1s;"></div>
                </div>
                
                <div class="cal-grid" id="cal-grid"></div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px; text-align:center;">
                    <div style="background:#000; padding:10px; border-radius:8px; border: 1px solid #222;">
                        <small style="font-size:0.5rem; color:#555;">SUMA CALENDARIO</small>
                        <div id="disp-real" style="font-size:1.2rem; font-weight:bold; color:var(--blue)">$0</div>
                    </div>
                    <input type="number" id="obj-val" value="1000000" oninput="updatePerf()" style="text-align:center; height:55px;">
                </div>
            </div>

            <div class="card">
                <h2>📋 Multi-Cotizador</h2>
                <input type="text" id="cCliente" placeholder="Nombre del Cliente...">
                <input type="text" id="cParte" placeholder="Número de Parte..." oninput="buscarPieza()">
                <div id="qTemp" style="font-size: 0.65rem; color: #555; margin: 5px 0;">Ref: <span id="qDesc">--</span> | Unit: <span id="qUnit">$0</span></div>
                
                <div class="qty-row">
                    <input type="number" id="cCant" value="1" min="1">
                    <button class="btn-add" onclick="agregarAlCarrito()">AÑADIR +</button>
                </div>

                <div class="cart-box" id="carrito-items">Lista vacía</div>
                <div style="text-align:right; font-size:1.3rem; font-weight:bold; margin-top:10px; color:var(--green);" id="total-cart">$0.00</div>
                
                <button class="btn btn-ws" onclick="enviarWS()">📲 Enviar Cotización</button>
                <button onclick="limpiarCarrito()" style="background:none; border:none; color:#555; width:100%; font-size:0.6rem; margin-top:10px; cursor:pointer;">BORRAR LISTA</button>
            </div>

            <div class="card">
                <h2>👥 Mis Clientes</h2>
                <input type="text" id="search-cli" placeholder="🔍 Buscar cliente..." oninput="renderCartera()">
                <div id="mi-lista-clientes"></div>
            </div>
        </div>
    </div>

    <script>
        const URL_V = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=0&single=true&output=csv&t=${new Date().getTime()}`;
        const URL_P = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1610979668&single=true&output=csv&t=${new Date().getTime()}`;

        let dbV = [], dbP = [], miCartera = [], carrito = [], itemTemp = null, userNombre = "";

        const getVal = (obj, key) => {
            const k = Object.keys(obj).find(x => x.trim().toLowerCase().includes(key.toLowerCase()));
            return k ? obj[k] : null;
        };

        window.onload = () => {
            const cal = document.getElementById('cal-grid');
            for(let i=1; i<=31; i++) cal.innerHTML += `<div class="day-box"><span class="day-num">${i}</span><input type="number" class="day-in" placeholder="0" oninput="updatePerf()"></div>`;
            Papa.parse(URL_V, { download: true, header: true, complete: (r) => { dbV = r.data; } });
            Papa.parse(URL_P, { download: true, header: true, complete: (r) => { dbP = r.data; } });
        };

        function login() {
            const nIn = document.getElementById('user-name').value.trim().toUpperCase();
            const pIn = document.getElementById('user-pass').value.trim().toUpperCase();
            const matches = dbV.filter(f => {
                const full = (getVal(f, 'Nombre') || "").toUpperCase();
                const ape = full.split(" ").pop();
                return full.includes(nIn) && (ape + "123") === pIn;
            });
            if (matches.length > 0) {
                userNombre = matches[0].Nombre; miCartera = matches;
                document.getElementById('login-screen').style.display='none';
                document.getElementById('main-app').style.display='block';
                document.getElementById('user-display').innerText = userNombre;
                renderPista(); renderCartera();
            } else { document.getElementById('login-error').style.display='block'; }
        }

        function renderPista() {
            const pista = document.getElementById('pista-global'); pista.innerHTML = '';
            const vUnicos = [...new Set(dbV.map(f => getVal(f, 'Nombre')))].filter(n => n);
            vUnicos.forEach(nom => {
                const data = dbV.find(f => getVal(f, 'Nombre') === nom);
                const pct = Math.min(100, (parseFloat(getVal(data, 'Ventas'))/parseFloat(getVal(data, 'Meta')))*100);
                pista.innerHTML += `<div class="race-lane"><div class="vendor-tag">${nom}</div><div class="truck ${nom===userNombre?'my-truck':''}" style="left:calc(${pct}% - 85px)"></div></div>`;
            });
        }

        function updatePerf() {
            const obj = parseFloat(document.getElementById('obj-val').value) || 1;
            let total = 0; document.querySelectorAll('.day-in').forEach(i => total += parseFloat(i.value) || 0);
            const pct = (total/obj)*100;
            document.getElementById('disp-real').innerText = "$" + total.toLocaleString();
            document.getElementById('pct-alcance').innerText = pct.toFixed(1) + "%";
            document.getElementById('bar-fill').style.width = Math.min(100, pct) + "%";
            let r="ROJO", c="var(--red)";
            if(pct>=120){r="ORO";c="#ffd700";}else if(pct>=110){r="PLATA";c="#c0c0c0";}else if(pct>=100){r="BRONCE";c="#cd7f32";}
            document.getElementById('rango-bono').innerText = r; document.getElementById('rango-bono').style.color = c;
        }

        function buscarPieza() {
            const pIn = document.getElementById('cParte').value.trim().toUpperCase();
            itemTemp = dbP.find(x => (getVal(x, 'Parte') || "").toString().toUpperCase() === pIn);
            if(itemTemp) {
                document.getElementById('qDesc').innerText = getVal(itemTemp, 'Descripcion');
                document.getElementById('qUnit').innerText = "$" + parseFloat(getVal(itemTemp, 'Precio')).toLocaleString();
            }
        }

        function agregarAlCarrito() {
            if(!itemTemp) return;
            const cant = parseInt(document.getElementById('cCant').value) || 1;
            const pre = parseFloat(getVal(itemTemp, 'Precio'));
            carrito.push({ desc: getVal(itemTemp, 'Descripcion') || getVal(itemTemp, 'Parte'), cant, unit: pre, sub: pre * cant });
            document.getElementById('cParte').value = ''; itemTemp = null;
            renderCarrito();
        }

        function renderCarrito() {
            const box = document.getElementById('carrito-items'), tBox = document.getElementById('total-cart');
            if(carrito.length === 0) { box.innerHTML = "Lista vacía"; tBox.innerText = "$0.00"; return; }
            let h = '', t = 0;
            carrito.forEach(it => { h += `<div class="cart-item"><span>${it.cant}x ${it.desc}</span><b>$${it.sub.toLocaleString()}</b></div>`; t += it.sub; });
            box.innerHTML = h; tBox.innerText = "$" + t.toLocaleString();
        }

        function limpiarCarrito() { carrito = []; renderCarrito(); }

        function enviarWS() {
            if(carrito.length === 0) return;
            let msg = `*CATOSA - COTIZACIÓN*\n--------------------------\n`;
            carrito.forEach(it => msg += `• ${it.cant}x ${it.desc} = *$${it.sub.toLocaleString()}*\n`);
            msg += `--------------------------\n*TOTAL: ${document.getElementById('total-cart').innerText}*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function renderCartera() {
            const list = document.getElementById('mi-lista-clientes'), search = document.getElementById('search-cli').value.toLowerCase();
            list.innerHTML = '';
            miCartera.forEach(f => {
                const cli = getVal(f, 'Cliente'), d = parseInt(getVal(f, 'Dias')) || 0, fch = getVal(f, 'Fecha') || "N/A";
                if (cli && cli.toLowerCase().includes(search)) {
                    list.innerHTML += `<div class="client-row"><div class="t-light"><div class="light ${d<=14?'on':''}" style="color:#0f0;background:#0f0;"></div><div class="light ${d>14&&d<=60?'on':''}" style="color:#ff0;background:#ff0;"></div><div class="light ${d>60?'on':''}" style="color:#f00;background:#f00;"></div></div><div style="flex:1;"><span style="font-size:12px; font-weight:bold;">${cli}</span><br><small style="font-size:9px; color:#555;">Última: ${fch}</small></div><b style="font-size:10px; color:var(--red)">${d}d</b></div>`;
                }
            });
        }
    </script>
</body>
</html>
