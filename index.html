<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catosa GP - Ultimate Performance</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --red: #d21034; --bg: #32373c; --card: #1a1d20; 
            --green: #00ff88; --blue: #00d4ff; --text: #f5f5f5; --asfalto: #181a1c; 
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        
        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 2px solid #444; margin-bottom: 15px; }
        .logo { max-height: 25px; }
        h1 { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; text-align: center; flex: 1; margin: 0; }

        #status-bar { text-align: center; font-size: 0.6rem; color: #ffab00; margin-bottom: 10px; }

        /* PISTA DE CARRERAS */
        .race-track { max-width: 1000px; margin: 0 auto 20px; background: var(--asfalto); border-radius: 10px; padding: 15px 0; border: 2px solid #444; position: relative; overflow: hidden; box-shadow: inset 0 0 20px #000; }
        .finish-line { position: absolute; right: 0; top: 0; bottom: 0; width: 25px; background-image: linear-gradient(45deg, #fff 25%, transparent 25%), linear-gradient(-45deg, #fff 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #fff 75%), linear-gradient(-45deg, transparent 75%, #fff 75%); background-size: 12px 12px; background-color: #000; opacity: 0.4; }
        .race-lane { height: 50px; position: relative; border-bottom: 1px dashed rgba(255,255,255,0.05); display: flex; align-items: center; }
        .vendor-label { position: absolute; left: 10px; top: 5px; font-size: 9px; font-weight: bold; color: rgba(255,255,255,0.2); }
        .truck { position: absolute; bottom: 5px; left: 0; width: 80px; height: 35px; background-image: url('camion-intl.png'); background-size: contain; background-repeat: no-repeat; transition: all 2s; z-index: 10; }
        .truck.leader { filter: drop-shadow(0 0 10px var(--red)); }

        /* GRID PRINCIPAL */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 15px; max-width: 1400px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; padding: 18px; border: 1px solid #333; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        h2 { font-size: 0.7rem; color: #666; text-transform: uppercase; margin: 0 0 15px 0; border-left: 3px solid var(--red); padding-left: 10px; }

        /* CALENDARIO DE METAS */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 10px; }
        .day-box { background: #000; border: 1px solid #222; border-radius: 4px; padding: 4px; min-height: 45px; text-align: center; }
        .day-num { font-size: 0.6rem; color: #444; display: block; }
        .day-in { width: 100%; background: transparent; border: none; color: var(--green); font-size: 0.7rem; text-align: center; outline: none; }
        .prog-bg { width: 100%; height: 8px; background: #000; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .prog-fill { height: 100%; background: linear-gradient(90deg, var(--red), var(--green)); width: 0%; transition: 0.5s; }

        /* COTIZADOR */
        input { width: 100%; background: #000; border: 1px solid #333; padding: 10px; border-radius: 6px; color: #fff; margin: 5px 0; box-sizing: border-box; }
        .qty-row { display: grid; grid-template-columns: 2fr 1fr; gap: 8px; }
        .btn-add { background: var(--blue); color: #000; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .cart-box { background: #0c0e10; border-radius: 8px; padding: 10px; font-size: 0.75rem; margin-top: 10px; min-height: 50px; }
        .cart-item { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 4px 0; }
        
        /* CARTERA SEMÁFORO */
        .client-row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; }
        .t-light { display: flex; flex-direction: column; gap: 3px; background: #000; padding: 5px; border-radius: 15px; width: 16px; border: 1px solid #333; margin-right: 12px; }
        .light { width: 10px; height: 10px; border-radius: 50%; opacity: 0.1; }
        .light.on { opacity: 1; box-shadow: 0 0 8px currentColor; }

        /* BOTONES DE ACCIÓN */
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.65rem; color: #fff; }
        .btn-ws { background: linear-gradient(135deg, #25d366, #128c7e); }
        .btn-mail { background: #444; }
        .btn-clear { background: transparent; color: #555; border: 1px solid #333; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo-catosa.png" class="logo" onerror="this.style.display='none'">
        <h1>Catosa Official GP Performance</h1>
        <img src="logo-international.png" class="logo" onerror="this.style.display='none'">
    </div>

    <div id="status-bar">🛰️ ESTABLECIENDO CONEXIÓN...</div>

    <div class="race-track">
        <div class="finish-line"></div>
        <div id="pista-competencia"></div>
    </div>

    <div class="grid">
        
        <div class="card">
            <h2>📅 Seguimiento de Meta</h2>
            <div style="display:flex; justify-content:space-between; font-size:0.7rem; color:#888; margin-bottom:5px;">
                <span>ALCANCE ACTUAL: <b id="pct-alcance" style="color:var(--green)">0%</b></span>
                <span>BONO: <b id="rango-bono" style="color:var(--red)">ROJO</b></span>
            </div>
            <div class="prog-bg"><div class="prog-fill" id="bar-fill"></div></div>
            
            <div class="cal-grid" id="cal-grid">
                </div>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
                <div style="background:#000; padding:10px; border-radius:8px; text-align:center;">
                    <small style="font-size:0.5rem; color:#555;">VENTA TOTAL</small>
                    <div id="total-v-mensual" style="font-size:1.1rem; font-weight:bold; color:var(--green)">$0</div>
                </div>
                <div style="background:#000; padding:10px; border-radius:8px; text-align:center;">
                    <small style="font-size:0.5rem; color:#555;">COMISIÓN EST.</small>
                    <div id="total-comision" style="font-size:1.1rem; font-weight:bold; color:#ffd700">$0</div>
                </div>
            </div>
            <input type="number" id="obj-mensual" value="1000000" oninput="updatePerformance()" placeholder="Objetivo Mensual ($)">
        </div>

        <div class="card">
            <h2>📋 Multi-Cotizador Pro</h2>
            <input type="text" id="cCliente" placeholder="Nombre del Cliente...">
            <input type="text" id="cParte" placeholder="Número de Parte..." oninput="buscarPieza()">
            
            <div style="font-size: 0.65rem; color: #555; margin: 5px 0;">
                Ref: <span id="qDesc" style="color:#aaa">--</span> | Unit: <span id="qUnit" style="color:var(--green)">$0</span>
            </div>

            <div class="qty-row">
                <input type="number" id="cCant" value="1" min="1">
                <button class="btn-add" onclick="agregarCarrito()">AÑADIR +</button>
            </div>

            <div class="cart-box" id="carrito-items">Lista vacía</div>
            <div style="text-align:right; font-size:1.2rem; font-weight:bold; margin-top:10px;" id="total-cart">$0.00</div>

            <div class="btn-group">
                <button class="btn btn-ws" onclick="enviar('ws')">📲 WhatsApp</button>
                <button class="btn btn-mail" onclick="enviar('mail')">✉️ E-mail</button>
            </div>
            <button class="btn btn-clear" onclick="limpiarCarrito()">Limpiar Cotización</button>
        </div>

        <div class="card">
            <h2>👥 Cartera Semáforo</h2>
            <div id="lista-clientes"></div>
        </div>

    </div>

    <script>
        const URL_V = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=0&single=true&output=csv&t=${new Date().getTime()}`;
        const URL_P = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1610979668&single=true&output=csv&t=${new Date().getTime()}`;

        let dbV = [], dbP = [], carrito = [], itemTemp = null;

        // Buscador de columnas inteligente
        const getVal = (obj, key) => {
            if(!obj) return null;
            const k = Object.keys(obj).find(x => x.trim().toLowerCase().includes(key.toLowerCase()));
            return k ? obj[k] : null;
        };

        async function init() {
            // Generar Calendario
            const cal = document.getElementById('cal-grid');
            for(let i=1; i<=31; i++) {
                cal.innerHTML += `<div class="day-box"><span class="day-num">${i}</span><input type="number" class="day-in" placeholder="0" oninput="updatePerformance()"></div>`;
            }

            Papa.parse(URL_V, { download: true, header: true, complete: (r) => { dbV = r.data; renderV(); } });
            Papa.parse(URL_P, { download: true, header: true, complete: (r) => { 
                dbP = r.data; 
                document.getElementById('status-bar').innerText = "● SISTEMA ONLINE - CATOSA GP";
                document.getElementById('status-bar').style.color = "var(--green)";
            } });
        }

        function renderV() {
            const p = document.getElementById('pista-competencia'), l = document.getElementById('lista-clientes');
            p.innerHTML = ''; l.innerHTML = '';
            let max = 0, leader = -1;

            dbV.forEach((f, i) => {
                const ven = parseFloat(getVal(f, 'Ventas')) || 0, met = parseFloat(getVal(f, 'Meta')) || 1;
                if((ven/met) > max) { max = (ven/met); leader = i; }
            });

            dbV.forEach((f, i) => {
                const nom = getVal(f, 'Nombre'), ven = parseFloat(getVal(f, 'Ventas')) || 0, met = parseFloat(getVal(f, 'Meta')) || 1;
                if(nom) {
                    const pct = Math.min(100, (ven/met)*100);
                    p.innerHTML += `<div class="race-lane"><div class="vendor-label">${nom.toUpperCase()}</div><div class="truck ${i===leader && pct>0 ? 'leader':''}" style="left:calc(${pct}% - 80px)"></div></div>`;
                }
                const cli = getVal(f, 'Cliente'), d = parseInt(getVal(f, 'Dias')) || 0, fch = getVal(f, 'Fecha') || "N/A";
                if(cli) {
                    l.innerHTML += `<div class="client-row"><div class="t-light"><div class="light ${d<=14 ? 'on':''}" style="color:#0f0;background:#0f0;"></div><div class="light ${d>14 && d<=60 ? 'on':''}" style="color:#ff0;background:#ff0;"></div><div class="light ${d>60 ? 'on':''}" style="color:#f00;background:#f00;"></div></div><div style="flex:1;"><span style="font-size:12px;font-weight:bold;">${cli}</span><br><small style="font-size:9px;color:#555;">Última compra: ${fch}</small></div><b style="font-size:10px;color:var(--red)">${d}d</b></div>`;
                }
            });
        }

        function updatePerformance() {
            const obj = parseFloat(document.getElementById('obj-mensual').value) || 1;
            const days = document.querySelectorAll('.day-in');
            let acumulado = 0;
            days.forEach(d => acumulado += parseFloat(d.value) || 0);

            document.getElementById('total-v-mensual').innerText = "$" + acumulado.toLocaleString();
            const pct = (acumulado / obj) * 100;
            document.getElementById('pct-alcance').innerText = pct.toFixed(1) + "%";
            document.getElementById('bar-fill').style.width = Math.min(100, pct) + "%";

            let com = 0, rango = "ROJO", color = "var(--red)";
            if(pct >= 120) { rango = "ORO"; com = acumulado * 0.015; color = "#ffd700"; }
            else if(pct >= 110) { rango = "PLATA"; com = acumulado * 0.012; color = "#c0c0c0"; }
            else if(pct >= 100) { rango = "BRONCE"; com = acumulado * 0.010; color = "#cd7f32"; }

            document.getElementById('rango-bono').innerText = rango;
            document.getElementById('rango-bono').style.color = color;
            document.getElementById('total-comision').innerText = "$" + Math.floor(com).toLocaleString();
        }

        function buscarPieza() {
            const pIn = document.getElementById('cParte').value.trim().toUpperCase();
            const cIn = document.getElementById('cCliente').value.trim().toUpperCase();
            itemTemp = dbP.find(x => {
                const pEx = (getVal(x, 'Parte') || "").toString().toUpperCase();
                const cEx = (getVal(x, 'Especial') || "").toString().toUpperCase();
                return pEx === pIn && (cEx === cIn || cEx === "");
            });
            if(itemTemp) {
                document.getElementById('qDesc').innerText = getVal(itemTemp, 'Descripcion') || "Pieza OK";
                document.getElementById('qUnit').innerText = "$" + parseFloat(getVal(itemTemp, 'Precio')).toLocaleString();
            }
        }

        function agregarCarrito() {
            if(!itemTemp) return;
            const cant = parseInt(document.getElementById('cCant').value) || 1;
            const precio = parseFloat(getVal(itemTemp, 'Precio'));
            carrito.push({ desc: getVal(itemTemp, 'Descripcion') || getVal(itemTemp, 'Parte'), cant, unit: precio, sub: precio * cant });
            document.getElementById('cParte').value = '';
            itemTemp = null;
            renderCarrito();
        }

        function renderCarrito() {
            const box = document.getElementById('carrito-items'), tBox = document.getElementById('total-cart');
            if(carrito.length === 0) { box.innerHTML = "Lista vacía"; tBox.innerText = "$0.00"; return; }
            let h = '', t = 0;
            carrito.forEach(it => { h += `<div class="cart-item"><span>${it.cant}x ${it.desc}</span><b>$${it.sub.toLocaleString()}</b></div>`; t += it.sub; });
            box.innerHTML = h; tBox.innerText = "$" + t.toLocaleString();
        }

        function limpiarCarrito() { carrito = []; renderCarrito(); }

        function enviar(tipo) {
            if(carrito.length === 0) return;
            let msg = `*CATOSA - COTIZACIÓN*\n--------------------------\n`;
            carrito.forEach(it => msg += `• ${it.cant}x ${it.desc} = *$${it.sub.toLocaleString()}*\n`);
            msg += `--------------------------\n*TOTAL: ${document.getElementById('total-cart').innerText}*`;
            if(tipo === 'ws') window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            else window.location.href = `mailto:?subject=Cotización&body=${encodeURIComponent(msg.replace(/\*/g,''))}`;
        }

        window.onload = init;
    </script>
</body>
</html>
