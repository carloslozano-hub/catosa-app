<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catosa GP - Acceso Privado</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --red: #d21034; --bg: #32373c; --card: #1a1d20; 
            --green: #00ff88; --blue: #00d4ff; --text: #f5f5f5; --asfalto: #181a1c; 
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* PANTALLA DE ACCESO */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--red); box-shadow: 0 0 20px rgba(210,16,52,0.3); width: 85%; max-width: 350px; text-align: center; }
        
        /* APP PRINCIPAL (Oculta al inicio) */
        #main-app { display: none; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 2px solid #444; margin-bottom: 15px; }
        .logo { max-height: 25px; }
        h1 { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; text-align: center; flex: 1; margin: 0; }

        /* PISTA */
        .race-track { max-width: 1000px; margin: 0 auto 20px; background: var(--asfalto); border-radius: 10px; padding: 20px 0; border: 2px solid #444; position: relative; overflow: hidden; box-shadow: inset 0 0 30px #000; }
        .finish-line { position: absolute; right: 0; top: 0; bottom: 0; width: 30px; background-image: linear-gradient(45deg, #fff 25%, transparent 25%), linear-gradient(-45deg, #fff 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #fff 75%), linear-gradient(-45deg, transparent 75%, #fff 75%); background-size: 15px 15px; background-color: #000; opacity: 0.4; }
        .race-lane { height: 60px; position: relative; display: flex; align-items: center; }
        .truck { position: absolute; bottom: 10px; left: 0; width: 100px; height: 45px; background-image: url('camion-intl.png'); background-size: contain; background-repeat: no-repeat; transition: all 2s cubic-bezier(0.12, 0.76, 0.44, 0.99); filter: drop-shadow(0 0 8px var(--red)); }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #333; }
        h2 { font-size: 0.7rem; color: #666; text-transform: uppercase; margin: 0 0 15px 0; border-left: 3px solid var(--red); padding-left: 10px; }

        input { width: 100%; background: #000; border: 1px solid #333; padding: 12px; border-radius: 8px; color: #fff; margin: 8px 0; box-sizing: border-box; font-size: 14px; }
        
        /* CALENDARIO DE METAS */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .day-box { background: #000; border: 1px solid #222; border-radius: 4px; padding: 4px; text-align: center; }
        .day-num { font-size: 0.6rem; color: #444; }
        .day-in { width: 100%; background: transparent; border: none; color: var(--green); font-size: 0.7rem; text-align: center; outline: none; }
        .prog-bg { width: 100%; height: 10px; background: #000; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .prog-fill { height: 100%; background: linear-gradient(90deg, var(--red), var(--green)); width: 0%; transition: 1s; }

        /* CARTERA SEMÁFORO */
        .client-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #222; }
        .t-light { display: flex; flex-direction: column; gap: 3px; background: #000; padding: 6px; border-radius: 15px; width: 16px; border: 1px solid #333; margin-right: 15px; }
        .light { width: 10px; height: 10px; border-radius: 50%; opacity: 0.1; }
        .light.on { opacity: 1; box-shadow: 0 0 10px currentColor; }

        /* BOTONES */
        .btn { padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; color: #fff; width: 100%; }
        .btn-red { background: var(--red); margin-top: 10px; }
        .btn-ws { background: linear-gradient(135deg, #25d366, #128c7e); margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <img src="logo-catosa.png" style="max-height: 40px; margin-bottom: 20px;">
            <h3 style="font-size: 0.7rem; letter-spacing: 2px;">IDENTIFICACIÓN ASESOR</h3>
            <input type="text" id="user-name" placeholder="Tu Nombre Completo..." style="text-align: center; text-transform: uppercase;">
            <button class="btn btn-red" onclick="login()">INGRESAR AL SISTEMA</button>
            <p id="login-error" style="color: var(--red); font-size: 0.6rem; margin-top: 10px; display: none;">Nombre no encontrado en la base de datos.</p>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <img src="logo-catosa.png" class="logo">
            <h1>GP PERFORMANCE: <span id="user-display" style="color:var(--red)">--</span></h1>
            <button onclick="location.reload()" style="background:none; border:none; color:#555; font-size:0.6rem; cursor:pointer;">SALIR</button>
        </div>

        <div class="race-track">
            <div class="finish-line"></div>
            <div id="mi-pista"></div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>📅 Mi Meta Mensual</h2>
                <div style="display:flex; justify-content:space-between; font-size:0.7rem; margin-bottom:10px;">
                    <span>ALCANCE: <b id="pct-alcance" style="color:var(--green)">0%</b></span>
                    <span>BONO: <b id="rango-bono">--</b></span>
                </div>
                <div class="prog-bg"><div id="bar-fill" class="prog-fill"></div></div>
                
                <div class="cal-grid" id="cal-grid"></div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px; text-align:center;">
                    <div style="background:#000; padding:10px; border-radius:8px;">
                        <small style="font-size:0.5rem; color:#555;">ACUMULADO REAL</small>
                        <div id="disp-real" style="font-size:1.2rem; font-weight:bold; color:var(--green)">$0</div>
                    </div>
                    <div style="background:#000; padding:10px; border-radius:8px;">
                        <small style="font-size:0.5rem; color:#555;">COMISIÓN EST.</small>
                        <div id="disp-com" style="font-size:1.2rem; font-weight:bold; color:#ffd700">$0</div>
                    </div>
                </div>
                <input type="number" id="obj-val" value="1000000" oninput="updatePerf()" placeholder="Objetivo Mensual ($)">
            </div>

            <div class="card">
                <h2>👥 Mi Cartera de Clientes</h2>
                <input type="text" id="search-cli" placeholder="🔍 Buscar cliente..." oninput="renderCartera()">
                <div id="mi-lista-clientes"></div>
            </div>

            <div class="card">
                <h2>📋 Cotizador Rápido</h2>
                <input type="text" id="cParte" placeholder="Número de Parte..." oninput="buscarPieza()">
                <div style="background:#000; padding:15px; border-radius:10px; border: 1px solid #222; margin: 10px 0;">
                    <div id="qDesc" style="font-size:0.7rem; color:#666;">--</div>
                    <div id="qTotal" style="font-size:1.6rem; font-weight:bold;">$0.00</div>
                </div>
                <button class="btn btn-ws" onclick="enviarWS()">📲 Enviar WhatsApp</button>
            </div>
        </div>
    </div>

    <script>
        // ENLACES CSV DE GOOGLE
        const URL_V = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=0&single=true&output=csv&t=${new Date().getTime()}`;
        const URL_P = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1610979668&single=true&output=csv&t=${new Date().getTime()}`;

        let dbV = [], dbP = [], miDataV = [], miCartera = [], itemTemp = null;

        const getVal = (obj, key) => {
            const k = Object.keys(obj).find(x => x.trim().toLowerCase().includes(key.toLowerCase()));
            return k ? obj[k] : null;
        };

        // INICIO
        window.onload = () => {
            // Generar Calendario
            const cal = document.getElementById('cal-grid');
            for(let i=1; i<=31; i++) cal.innerHTML += `<div class="day-box"><span class="day-num">${i}</span><input type="number" class="day-in" placeholder="0" oninput="updatePerf()"></div>`;
            
            // Cargar Datos
            Papa.parse(URL_V, { download: true, header: true, complete: (r) => { dbV = r.data; } });
            Papa.parse(URL_P, { download: true, header: true, complete: (r) => { dbP = r.data; } });
        };

        function login() {
            const nameIn = document.getElementById('user-name').value.trim().toUpperCase();
            const matches = dbV.filter(f => (getVal(f, 'Nombre') || "").toUpperCase() === nameIn);

            if (matches.length > 0) {
                miDataV = matches[0]; 
                miCartera = matches;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('user-display').innerText = nameIn;
                renderApp();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function renderApp() {
            // Pista
            const ven = parseFloat(getVal(miDataV, 'Ventas')) || 0, met = parseFloat(getVal(miDataV, 'Meta')) || 1;
            const pct = Math.min(100, (ven/met)*100);
            document.getElementById('mi-pista').innerHTML = `<div class="race-lane"><div class="truck" style="left:calc(${pct}% - 100px)"></div></div>`;
            
            // Metas
            document.getElementById('disp-real').innerText = "$" + ven.toLocaleString();
            document.getElementById('pct-alcance').innerText = pct.toFixed(1) + "%";
            document.getElementById('bar-fill').style.width = pct + "%";
            
            let r = "ROJO", c = "var(--red)";
            if(pct>=120) { r="ORO"; c="#ffd700"; } else if(pct>=110) { r="PLATA"; c="#c0c0c0"; } else if(pct>=100) { r="BRONCE"; c="#cd7f32"; }
            document.getElementById('rango-bono').innerText = r;
            document.getElementById('rango-bono').style.color = c;

            renderCartera();
        }

        function renderCartera() {
            const list = document.getElementById('mi-lista-clientes'), search = document.getElementById('search-cli').value.toLowerCase();
            list.innerHTML = '';
            miCartera.forEach(f => {
                const cli = getVal(f, 'Cliente'), d = parseInt(getVal(f, 'Dias')) || 0, fch = getVal(f, 'Fecha') || "N/A";
                if (cli && cli.toLowerCase().includes(search)) {
                    list.innerHTML += `<div class="client-row"><div class="t-light"><div class="light ${d<=14?'on':''}" style="color:#0f0;background:#0f0;"></div><div class="light ${d>14&&d<=60?'on':''}" style="color:#ff0;background:#ff0;"></div><div class="light ${d>60?'on':''}" style="color:#f00;background:#f00;"></div></div><div style="flex:1;"><span style="font-size:12px; font-weight:bold;">${cli}</span><br><small style="font-size:9px; color:#555;">Última: ${fch}</small></div><b style="font-size:10px; color:var(--red)">${d}d</b></div>`;
                }
            });
        }

        function updatePerf() {
            const obj = parseFloat(document.getElementById('obj-val').value) || 1;
            let total = 0;
            document.querySelectorAll('.day-in').forEach(i => total += parseFloat(i.value) || 0);
            const pct = (total/obj)*100;
            document.getElementById('disp-real').innerText = "$" + total.toLocaleString();
            document.getElementById('pct-alcance').innerText = pct.toFixed(1) + "%";
            document.getElementById('bar-fill').style.width = Math.min(100, pct) + "%";
            document.getElementById('disp-com').innerText = "$" + Math.floor(total * 0.012).toLocaleString(); // Ej. comisión base
        }

        function buscarPieza() {
            const pIn = document.getElementById('cParte').value.trim().toUpperCase();
            itemTemp = dbP.find(x => (getVal(x, 'Parte') || "").toString().toUpperCase() === pIn);
            if(itemTemp) {
                document.getElementById('qDesc').innerText = getVal(itemTemp, 'Descripcion');
                document.getElementById('qTotal').innerText = "$" + parseFloat(getVal(itemTemp, 'Precio')).toLocaleString();
            }
        }

        function enviarWS() {
            if(!itemTemp) return;
            const msg = `*CATOSA*\nRef: ${document.getElementById('qDesc').innerText}\nTotal: ${document.getElementById('qTotal').innerText}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
