<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catosa GP - Ventas Elite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --red: #d21034; --bg: #0c0e10; --card: #1a1d20; --green: #00ff88; --blue: #00d4ff; --text: #f5f5f5; --gold: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; border-top: 5px solid var(--red); text-align: center; width: 300px; }
        #main-app { display: none; }

        .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .kpi-card { background: var(--card); padding: 12px; border-radius: 10px; border-top: 3px solid var(--blue); text-align: center; }
        .kpi-val { font-size: 1.1rem; font-weight: bold; color: var(--green); }
        .kpi-card span { font-size: 0.55rem; color: #888; text-transform: uppercase; display: block; }
        @keyframes blink { 0% { background: var(--card); } 50% { background: #4a0000; } 100% { background: var(--card); } }
        .alert-blink { animation: blink 1s infinite; border-top: 3px solid var(--red) !important; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #333; }
        
        /* COTIZADORA */
        input, select { background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        .btn { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: #fff; background: var(--red); text-transform: uppercase; width: 100%; }
        
        /* CARTERA SEMAFORO IZQUIERDA */
        .client-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; font-size: 0.75rem; }
        .semaforo-mini { display: flex; flex-direction: column; gap: 2px; margin-right: 15px; width: 12px; flex-shrink: 0; }
        .dot-light { width: 10px; height: 10px; border-radius: 50%; background: #222; }
        .dot-light.active.verde { background: #0f0; box-shadow: 0 0 5px #0f0; }
        .dot-light.active.ambar { background: #ff0; box-shadow: 0 0 5px #ff0; }
        .dot-light.active.rojo { background: #f00; box-shadow: 0 0 5px #f00; }
        .client-data { flex: 1; }
        
        /* ALMACEN */
        .stock-item { display: flex; justify-content: space-between; padding: 6px; border-bottom: 1px solid #222; font-size: 0.7rem; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <img src="logo-catosa.png" style="max-height: 40px; margin-bottom: 20px;">
            <input type="text" id="u-name" placeholder="NOMBRE DE VENDEDOR">
            <button class="btn" onclick="login()">ENTRAR AL GP</button>
        </div>
    </div>

    <div id="main-app">
        <div class="kpi-row">
            <div class="kpi-card"><span>Mi Venta</span><div class="kpi-val" id="v-venta">$0</div></div>
            <div class="kpi-card" id="card-falta"><span>Falta para Plata</span><div class="kpi-val" id="v-falta">$0</div></div>
            <div class="kpi-card"><span>Avance Plata</span><div class="kpi-val" id="v-p-plata">0%</div></div>
            <div class="kpi-card"><span>Avance Oro</span><div class="kpi-val" id="v-p-oro">0%</div></div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>📱 Cotizadora WhatsApp</h2>
                <input type="text" id="c-phone" placeholder="WhatsApp (10 dígitos)">
                <input type="text" id="c-link" placeholder="Link de Cotización (PDF)">
                <button class="btn" style="background:#25d366" onclick="sendQuote()">ENVIAR POR WHATSAPP</button>
            </div>

            <div class="card">
                <h2>📦 Consulta de Stock</h2>
                <input type="text" placeholder="Buscar por SKU o Marca..." oninput="checkInventory(this.value)">
                <div id="inv-res" style="max-height: 200px; overflow-y: auto;">
                    <div style="text-align:center; color:#555; padding-top:20px;">Escribe para buscar stock...</div>
                </div>
            </div>

            <div class="card">
                <h2>👥 Mi Cartera Clientes</h2>
                <select id="f-color" onchange="render()"><option value="TODOS">TODOS LOS COLORES</option><option value="VERDE">VERDES (ACTIVOS)</option><option value="AMBAR">AMBAR (POR VENCER)</option><option value="ROJO">ROJO (INACTIVOS)</option></select>
                <div id="cli-list" style="max-height: 400px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <script>
        const L = {
            v: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=0&single=true&output=csv",
            c: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1068966462&single=true&output=csv",
            p: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1610979668&single=true&output=csv"
        };
        let dbV=[], dbC=[], dbP=[], user='';

        function login() {
            user = document.getElementById('u-name').value.toUpperCase();
            if(!user) return alert("Ingresa tu nombre");
            document.getElementById('login-screen').style.display='none';
            document.getElementById('main-app').style.display='block';
            loadData();
        }

        function loadData() {
            Papa.parse(L.v, { download:true, header:true, complete: r => { dbV=r.data; render(); } });
            Papa.parse(L.c, { download:true, header:true, complete: r => { dbC=r.data; render(); } });
            Papa.parse(L.p, { download:true, header:true, complete: r => dbP=r.data });
        }

        function render() {
            const vData = dbV.find(x => x.Nombre && x.Nombre.toUpperCase().includes(user));
            if(vData) {
                const ven = parseFloat(vData.Ventas.replace(/[^0-9.]/g,''))||0;
                const met = parseFloat(vData.Meta.replace(/[^0-9.]/g,''))||1;
                document.getElementById('v-venta').innerText = "$" + Math.floor(ven).toLocaleString();
                document.getElementById('v-falta').innerText = "$" + Math.max(0, Math.floor(met - ven)).toLocaleString();
                document.getElementById('v-p-plata').innerText = ((ven/met)*100).toFixed(1) + "%";
                document.getElementById('v-p-oro').innerText = ((ven/(met*1.15))*100).toFixed(1) + "%";
                
                // Parpadeo de cierre
                const hoy = new Date(), uD = new Date(hoy.getFullYear(), hoy.getMonth() + 1, 0).getDate(), dR = (uD - hoy.getDate()) + 1;
                if(dR <= 5) document.getElementById('card-falta').classList.add('alert-blink');
            }

            const cl = document.getElementById('cli-list'), fCol = document.getElementById('f-color').value;
            cl.innerHTML = '';
            dbC.filter(c => c.Vendedor && c.Vendedor.toUpperCase().includes(user)).forEach(c => {
                const d = parseInt(c.Dias)||0;
                const colorMatch = (fCol==='VERDE'?d<=14:(fCol==='AMBAR'?d>14&&d<=60:(fCol==='ROJO'?d>60:true)));
                if(colorMatch) {
                    cl.innerHTML += `
                    <div class="client-item">
                        <div class="semaforo-mini">
                            <div class="dot-light verde ${d<=14?'active':''}"></div>
                            <div class="dot-light ambar ${d>14&&d<=60?'active':''}"></div>
                            <div class="dot-light rojo ${d>60?'active':''}"></div>
                        </div>
                        <div class="client-data"><b>${c.Cliente}</b><br><small>${d} días sin compra</small></div>
                        <div style="text-align:right"><b>$${Math.floor(parseFloat(c.Venta_Mes)||0).toLocaleString()}</b></div>
                    </div>`;
                }
            });
        }

        function checkInventory(q) {
            const box = document.getElementById('inv-res');
            if(!q) { box.innerHTML = '<div style="text-align:center; color:#555; padding-top:20px;">Escribe para buscar stock...</div>'; return; }
            const res = dbP.filter(p => (p.Parte||'').toUpperCase().includes(q.toUpperCase()) || (p.Marca||'').toUpperCase().includes(q.toUpperCase())).slice(0,30);
            box.innerHTML = '';
            res.forEach(p => {
                const qty = parseInt(p.Existencia)||0;
                box.innerHTML += `<div class="stock-item"><span><b>${p.Parte}</b><br><small>${p.Marca}</small></span><b style="color:${qty<=0?'var(--red)':'var(--green)'}">${qty} pz</b></div>`;
            });
        }

        function sendQuote() {
            const ph = document.getElementById('c-phone').value;
            const li = document.getElementById('c-link').value;
            if(!ph || !li) return alert("Llena teléfono y link");
            const msg = encodeURIComponent(`Buen día. Soy ${user}, le envío la cotización solicitada: ${li} . Quedo al pendiente de su compra.`);
            window.open(`https://wa.me/52${ph}?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
